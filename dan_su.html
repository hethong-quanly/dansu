<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Án Dân sự</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #0408c5; color: #f8f536; text-align: center; padding: 15px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 25px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; }
        .container { display: flex; padding: 20px; gap: 25px; }
        .sidebar { flex: 1.3; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .main-panel { flex: 2.5; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-y: auto; }
        
        .form-group { margin-bottom: 16px; }
        label { font-weight: bold; margin-bottom: 6px; color: #333; display: block; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 8px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; vertical-align: top; }
        th { background: #e0f2f1; color: #0408c5; }
        
        .btn-save { background: #5670e6; color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        .btn-add { background: #4caf50; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 5px; }
        .btn-edit { background: #ff9800; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; margin-right: 5px; }
        .btn-delete { background: #d32f2f; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        .btn-pdf { background: #4caf50; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        
        .multi-item { display: flex; gap: 10px; margin-top: 8px; align-items: center; }
        .section { background: #f0f4ff; padding: 15px; border-radius: 8px; margin: 15px 0; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h2>HỆ THỐNG QUẢN LÝ ÁN DÂN SỰ</h2>
    </header>
    
    <div class="container">
        <div class="sidebar">
            <h3>Nhập thông tin thụ lý án</h3>
            
            <div class="form-group">
                <label>Thụ lý cấp:</label>
                <select id="cap_thu_ly" onchange="toggleXetXuFields()">
                    <option value="So tham">Sơ thẩm</option>
                    <option value="Phuc tham">Phúc thẩm</option>
                    <option value="Giam doc tham">Giám đốc thẩm</option>
                    <option value="Tai tham">Tái thẩm</option>
                </select>
            </div>

            <!-- PHẦN SƠ THẨM -->
            <div id="so_tham_section">
                <div class="form-group">
                    <label>Nguyên đơn & Địa chỉ:</label>
                    <div id="nguyen_don_list"></div>
                    <button class="btn-add" onclick="addNguyenDon()">+ Thêm Nguyên đơn</button>
                </div>
                <div class="form-group">
                    <label>Bị đơn & Địa chỉ:</label>
                    <div id="bi_don_list"></div>
                    <button class="btn-add" onclick="addBiDon()">+ Thêm Bị đơn</button>
                </div>
                <div class="form-group">
                    <label>Người có quyền lợi nghĩa vụ liên quan & Địa chỉ:</label>
                    <div id="lien_quan_list"></div>
                    <button class="btn-add" onclick="addLienQuan()">+ Thêm Người liên quan</button>
                </div>
                <div class="form-group"><label>Nội dung vụ kiện:</label><textarea id="noi_dung" rows="4"></textarea></div>
            </div>

            <!-- PHẦN ĐÃ XÉT XỬ (Phúc thẩm, GĐT, Tái thẩm) -->
            <div id="da_xet_xu_section" class="section" style="display:none;">
                <h4>ĐÃ XÉT XỬ</h4>
                <div class="form-group">
                    <label>Cấp đã xét xử:</label>
                    <select id="cap_da_xet_xu">
                        <option value="So tham">Sơ thẩm</option>
                        <option value="Phuc tham">Phúc thẩm</option>
                        <option value="Giam doc tham">Giám đốc thẩm</option>
                    </select>
                </div>
                <div class="form-group"><label>Số Bản án / Quyết định:</label><input type="text" id="so_ban_an"></div>
                <div class="form-group"><label>Ngày ban hành:</label><input type="date" id="ngay_ban_hanh"></div>
                <div class="form-group"><label>Nội dung Bản án/Quyết định đã tuyên:</label><textarea id="noi_dung_da_tuyen" rows="3"></textarea></div>

                <div class="form-group">
                    <label>Đương sự hoặc Viện kiểm sát kháng cáo / kháng nghị / yêu cầu:</label>
                    <div id="khang_cao_list"></div>
                    <button class="btn-add" onclick="addKhangCaoItem()">+ Thêm</button>
                </div>

                <!-- Nút chuyển sang Thi hành án khi có hiệu lực -->
                <div class="form-group">
                    <label>Trạng thái hiệu lực:</label>
                    <select id="trang_thai_hieu_luc" onchange="checkHieuLuc()">
                        <option value="Chua_hieu_luc">Chưa có hiệu lực</option>
                        <option value="Co_hieu_luc">Có hiệu lực</option>
                    </select>
                </div>
            </div>

            <div class="form-group"><label>Ngày thụ lý:</label><input type="date" id="ngay_thu_ly"></div>
            <div class="form-group"><label>Thẩm phán:</label><input type="text" id="tham_phan"></div>
            <div class="form-group"><label>Thư ký:</label><input type="text" id="thu_ky"></div>
            <div class="form-group"><label>Kiểm sát viên:</label><input type="text" id="ksv"></div>

            <div class="form-group">
                <label>Đính kèm File PDF:</label>
                <input type="file" id="pdf_file" accept=".pdf">
            </div>

            <button class="btn-save" onclick="saveData()" id="btn-save">LƯU HỒ SƠ</button>
        </div>

        <div class="main-panel">
            <h3>DANH SÁCH ÁN DÂN SỰ</h3>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Thụ lý cấp</th>
                        <th>Đã xét xử cấp</th>
                        <th>Số bản án</th>
                        <th>Ngày thụ lý</th>
                        <th>Nguyên đơn</th>
                        <th>Bị đơn</th>
                        <th>Nội dung vụ kiện</th>
                        <th>Trạng thái hiệu lực</th>
                        <th>File PDF</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        var storage = firebase.storage();

        let editingKey = null;

        function toggleXetXuFields() {
            const cap = document.getElementById('cap_thu_ly').value;
            document.getElementById('so_tham_section').style.display = (cap === "So tham") ? "block" : "none";
            document.getElementById('da_xet_xu_section').style.display = (cap === "So tham") ? "none" : "block";
        }

        function checkHieuLuc() {
            const trangThai = document.getElementById('trang_thai_hieu_luc').value;
            if (trangThai === "Co_hieu_luc") {
                if (confirm("Bản án có hiệu lực. Chuyển sang Thi hành án?")) {
                    transferToThiHanhAn();
                }
            }
        }

        function transferToThiHanhAn() {
            const data = {
                so_qd_tha: document.getElementById('so_ban_an').value,
                ngay_ban_hanh_qd: document.getElementById('ngay_ban_hanh').value,
                nguoi_phai_tha: "", // Có thể lấy từ nguyên đơn/bị đơn sau
                noi_dung_tha: document.getElementById('noi_dung_da_tuyen').value,
                ngay_nhan_qd: new Date().toISOString().split('T')[0],
                tinh_trang_tha: "Co dieu kien",
                timestamp: Date.now()
            };

            db.ref('thi_hanh_an').push(data).then(() => {
                alert("✅ Đã chuyển dữ liệu sang Thi hành án dân sự thành công!");
            });
        }

       addNguyenDon() {
            const container = document.getElementById('nguyen_don_list');
            const div = document.createElement('div');
            div.className = 'multi-item';
            div.innerHTML = `
                <input type="text" placeholder="Tên Nguyên đơn" style="flex:2">
                <input type="text" placeholder="Địa chỉ" style="flex:3">
                <button type="button" onclick="this.parentElement.remove()" style="background:#d32f2f;color:white;padding:6px 10px;border:none;border-radius:4px;">X</button>
            `;
            container.appendChild(div);
        }

        function addBiDon() {
            const container = document.getElementById('bi_don_list');
            const div = document.createElement('div');
            div.className = 'multi-item';
            div.innerHTML = `
                <input type="text" placeholder="Tên Bị đơn" style="flex:2">
                <input type="text" placeholder="Địa chỉ" style="flex:3">
                <button type="button" onclick="this.parentElement.remove()" style="background:#d32f2f;color:white;padding:6px 10px;border:none;border-radius:4px;">X</button>
            `;
            container.appendChild(div);
        }

        function addLienQuan() {
            const container = document.getElementById('lien_quan_list');
            const div = document.createElement('div');
            div.className = 'multi-item';
            div.innerHTML = `
                <input type="text" placeholder="Tên Người liên quan" style="flex:2">
                <input type="text" placeholder="Địa chỉ" style="flex:3">
                <button type="button" onclick="this.parentElement.remove()" style="background:#d32f2f;color:white;padding:6px 10px;border:none;border-radius:4px;">X</button>
            `;
            container.appendChild(div);
        }

        // ====================== THÊM KHÁNG CÁO / YÊU CẦU ======================
        function addKhangCaoItem() {
            const container = document.getElementById('khang_cao_list');
            const div = document.createElement('div');
            div.className = 'multi-item';
            div.innerHTML = `
                <select style="flex:1.2">
                    <option value="Nguyen don">Nguyên đơn</option>
                    <option value="Bi don">Bị đơn</option>
                    <option value="Nguoi lien quan">Người có quyền lợi nghĩa vụ liên quan</option>
                    <option value="Vien kiem sat">Viện kiểm sát</option>
                </select>
                <input type="text" placeholder="Tên" style="flex:2">
                <input type="text" placeholder="Địa chỉ" style="flex:2">
                <textarea placeholder="Nội dung kháng cáo / kháng nghị / yêu cầu..." rows="2" style="flex:3"></textarea>
                <button type="button" onclick="this.parentElement.remove()" style="background:#d32f2f;color:white;padding:6px 10px;border:none;border-radius:4px;">X</button>
            `;
            container.appendChild(div);
        }

        function toggleXetXuFields() {
            const cap = document.getElementById('cap_thu_ly').value;
            
            // Ẩn/Hiện phần Sơ thẩm
            document.getElementById('so_tham_section').style.display = (cap === "So tham") ? "block" : "none";
            
            // Ẩn/Hiện phần Đã xét xử
            document.getElementById('da_xet_xu_section').style.display = (cap === "So tham") ? "none" : "block";
        }

        function saveData() {
            const file = document.getElementById('pdf_file').files[0];

            const data = {
                cap_thu_ly: document.getElementById('cap_thu_ly').value,
                ngay_thu_ly: document.getElementById('ngay_thu_ly').value,
                noi_dung: document.getElementById('noi_dung').value,
                tham_phan: document.getElementById('tham_phan').value,
                thu_ky: document.getElementById('thu_ky').value,
                ksv: document.getElementById('ksv').value,
                timestamp: Date.now()
            };

            // Lưu thông tin đã xét xử nếu có
            if (document.getElementById('da_xet_xu_section').style.display !== "none") {
                data.so_ban_an = document.getElementById('so_ban_an').value;
                data.ngay_ban_hanh = document.getElementById('ngay_ban_hanh').value;
                data.noi_dung_da_tuyen = document.getElementById('noi_dung_da_tuyen').value;
            }

            if (file) {
                const storageRef = storage.ref('pdfs_an/' + Date.now() + '_' + file.name);
                storageRef.put(file).then(snapshot => {
                    snapshot.ref.getDownloadURL().then(url => {
                        data.pdf_url = url;
                        saveToDatabase(data);
                    });
                });
            } else {
                saveToDatabase(data);
            }
        }

        function saveData() {
            const file = document.getElementById('pdf_file').files[0];
           function saveData() {
            const file = document.getElementById('pdf_file').files[0];
            if (document.getElementById('trang_thai_hieu_luc') && document.getElementById('trang_thai_hieu_luc').value === "Co_hieu_luc") {
                transferToThiHanhAn();
            }
        }
        window.onload = () => {
            loadData();
            toggleXetXuFields();
        };
            if (document.getElementById('trang_thai_hieu_luc') && document.getElementById('trang_thai_hieu_luc').value === "Co_hieu_luc") {
                transferToThiHanhAn();
            }
        }

        window.onload = () => {
            loadData();
            toggleXetXuFields();
        };
    </script>
</body>
</html>
