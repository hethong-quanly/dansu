<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tài khoản - VKSND</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #0408c5; color: #f8f536; text-align: center; padding: 15px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 20px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; }
        
        .container { max-width: 1100px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 18px; }
        label { font-weight: bold; display: block; margin-bottom: 6px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #e0f2f1; color: #0408c5; }
        
        .btn-save { background: #5670e6; color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        .btn-reset { background: #ff9800; color: white; padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-delete { background: #d32f2f; color: white; padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; }
        
        .dynamic-fields { margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h2>QUẢN LÝ TÀI KHOẢN NGƯỜI DÙNG</h2>
    </header>

    <div class="container">
        <h3>Tạo / Chỉnh sửa tài khoản</h3>
        
        <div class="form-group">
            <label>Tên đăng nhập (username):</label>
            <input type="text" id="username" placeholder="Ví dụ: thienphuc">
        </div>
        <div class="form-group">
            <label>Mật khẩu (mặc định 123456):</label>
            <input type="password" id="password" value="123456">
        </div>

        <div class="form-group">
            <label>Cấp tài khoản:</label>
            <select id="cap_tai_khoan" onchange="toggleCapFields()">
                <option value="Toi cao">VKSND tối cao</option>
                <option value="Cap tinh">VKSND cấp tỉnh / TP trực thuộc TW</option>
                <option value="Khu vuc">VKSND khu vực trực thuộc tỉnh</option>
            </select>
        </div>

        <!-- Chọn Tỉnh (chỉ hiện khi cấp tỉnh hoặc khu vực) -->
        <div id="tinh_group" class="form-group" style="display:none;">
            <label>Tỉnh / Thành phố:</label>
            <select id="tinh_thanh"></select>
        </div>

        <!-- Khu vực (chỉ hiện khi chọn VKSNDKV) -->
        <div id="khuvuc_group" class="form-group" style="display:none;">
            <label>Khu vực số:</label>
            <select id="khu_vuc">
                <option value="">-- Chọn khu vực --</option>
                <!-- Sẽ được thêm động từ 1 đến 14 hoặc theo tỉnh -->
            </select>
        </div>

        <div class="form-group">
            <label>Loại tài khoản:</label>
            <select id="loai_tai_khoan" onchange="toggleLoaiFields()">
                <option value="Can bo">Cán bộ</option>
                <option value="Lanh dao">Lãnh đạo</option>
            </select>
        </div>

        <!-- Phần Cán bộ -->
        <div id="canbo_fields" class="dynamic-fields">
            <label>Chức vụ cán bộ:</label>
            <select id="chuc_vu_canbo">
                <option value="Kiem sat vien">Kiểm sát viên</option>
                <option value="Kiem tra vien">Kiểm tra viên</option>
            </select>
        </div>

        <!-- Phần Lãnh đạo -->
        <div id="lanhdao_fields" class="dynamic-fields" style="display:none;">
            <label>Cấp lãnh đạo:</label>
            <select id="cap_lanh_dao" onchange="toggleCapLanhDao()">
                <option value="Cap vu">Cấp Vụ</option>
                <option value="Cap vien">Cấp Viện</option>
                <option value="Cap phong">Cấp Phòng</option>
            </select>

            <div id="chuc_vu_lanh_dao_group" class="form-group" style="margin-top:10px;">
                <label>Chức vụ cụ thể:</label>
                <select id="chuc_vu_lanh_dao"></select>
            </div>
        </div>

        <button class="btn-save" onclick="saveUser()">LƯU TÀI KHOẢN</button>
        <button class="btn-save" onclick="resetForm()" style="background:#999; margin-top:8px;">Làm mới form</button>
    </div>

    <div class="container">
        <h3>Danh sách tài khoản</h3>
        <table id="user-table">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Cấp</th>
                    <th>Loại</th>
                    <th>Chức vụ</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        // === Firebase Config (giữ nguyên của bạn) ===
        var firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        let editingUsername = null;

        const provinces = ["Hà Nội","TP. Hồ Chí Minh","Cần Thơ","Đà Nẵng","Hải Phòng","..."]; // bạn có thể bổ sung đầy đủ 34 tỉnh

        function toggleCapFields() {
            const cap = document.getElementById('cap_tai_khoan').value;
            const tinhGroup = document.getElementById('tinh_group');
            const khuvucGroup = document.getElementById('khuvuc_group');

            tinhGroup.style.display = (cap === "Cap tinh" || cap === "Khu vuc") ? "block" : "none";
            khuvucGroup.style.display = (cap === "Khu vuc") ? "block" : "none";
        }

        function toggleLoaiFields() {
            const loai = document.getElementById('loai_tai_khoan').value;
            document.getElementById('canbo_fields').style.display = (loai === "Can bo") ? "block" : "none";
            document.getElementById('lanhdao_fields').style.display = (loai === "Lanh dao") ? "block" : "none";
        }

        function toggleCapLanhDao() {
            const cap = document.getElementById('cap_lanh_dao').value;
            const select = document.getElementById('chuc_vu_lanh_dao');
            select.innerHTML = '';

            if (cap === "Cap vu") {
                select.innerHTML = `<option value="Vu truong">Vụ trưởng</option><option value="Vu pho">Vụ phó</option>`;
            } else if (cap === "Cap vien") {
                select.innerHTML = `<option value="Vien truong">Viện trưởng</option><option value="Pho vien truong">Phó Viện trưởng</option>`;
            } else if (cap === "Cap phong") {
                select.innerHTML = `<option value="Truong phong">Trưởng phòng</option><option value="Pho phong">Phó phòng</option>`;
            }
        }

        function saveUser() {
            const username = document.getElementById('username').value.trim();
            if (!username) { alert("Vui lòng nhập tên đăng nhập!"); return; }

            const userData = {
                password: document.getElementById('password').value || "123456",
                cap_tai_khoan: document.getElementById('cap_tai_khoan').value,
                loai_tai_khoan: document.getElementById('loai_tai_khoan').value,
                timestamp: Date.now()
            };

            // Thêm các trường động
            if (userData.loai_tai_khoan === "Can bo") {
                userData.chuc_vu = document.getElementById('chuc_vu_canbo').value;
            } else if (userData.loai_tai_khoan === "Lanh dao") {
                userData.cap_lanh_dao = document.getElementById('cap_lanh_dao').value;
                userData.chuc_vu = document.getElementById('chuc_vu_lanh_dao').value;
            }

            db.ref('users/' + username).set(userData).then(() => {
                alert("Tạo / Cập nhật tài khoản thành công!");
                resetForm();
                loadUsers();
            });
        }

        function loadUsers() {
            db.ref('users').on('value', snapshot => {
                const users = snapshot.val();
                let html = '';
                if (users) {
                    Object.keys(users).forEach(username => {
                        const u = users[username];
                        html += `<tr>
                            <td><strong>${username}</strong></td>
                            <td>${u.cap_tai_khoan || ''}</td>
                            <td>${u.loai_tai_khoan || ''}</td>
                            <td>${u.chuc_vu || ''}</td>
                            <td>
                                <button class="btn-reset" onclick="resetPassword('${username}')">Reset MK</button>
                                <button class="btn-delete" onclick="deleteUser('${username}')">Xóa</button>
                            </td>
                        </tr>`;
                    });
                }
                document.getElementById('table-body').innerHTML = html || '<tr><td colspan="5" style="text-align:center;color:#999">Chưa có tài khoản nào</td></tr>';
            });
        }

        function resetPassword(username) {
            if (confirm(`Reset mật khẩu của ${username} về 123456?`)) {
                db.ref('users/' + username + '/password').set('123456').then(() => alert("Đã reset mật khẩu!"));
            }
        }

        function deleteUser(username) {
            if (confirm(`XÓA tài khoản ${username}?`)) {
                db.ref('users/' + username).remove().then(() => loadUsers());
            }
        }

        function resetForm() {
            document.getElementById('username').value = '';
            document.getElementById('password').value = '123456';
            document.getElementById('cap_tai_khoan').value = 'Toi cao';
            document.getElementById('loai_tai_khoan').value = 'Can bo';
            toggleCapFields();
            toggleLoaiFields();
            toggleCapLanhDao();
            editingUsername = null;
        }

        window.onload = () => {
            loadUsers();
            toggleCapFields();
            toggleLoaiFields();
            toggleCapLanhDao();
        };
    </script>
</body>
</html>
