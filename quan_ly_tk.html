<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tài khoản</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #0408c5; color: #f8f536; text-align: center; padding: 15px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 20px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; }
        
        .container { max-width: 1100px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 18px; }
        label { font-weight: bold; display: block; margin-bottom: 6px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #e0f2f1; color: #0408c5; }
        
        .btn-save { background: #5670e6; color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        .btn-reset { background: #ff9800; color: white; padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-delete { background: #d32f2f; color: white; padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; }
        
        .message { padding: 12px; margin: 10px 0; border-radius: 6px; text-align: center; font-weight: bold; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h2>QUẢN LÝ TÀI KHOẢN</h2>
    </header>

    <div class="container">
        <h3>Tạo tài khoản mới</h3>
        <div id="message"></div>

        <div class="form-group"><label>Tên đăng nhập:</label><input type="text" id="username"></div>
        <div class="form-group"><label>Họ và tên:</label><input type="text" id="fullname"></div>
        <div class="form-group"><label>Mật khẩu mặc định:</label><input type="text" id="password" value="123456" readonly></div>

        <div class="form-group">
            <label>Cấp:</label>
            <select id="level" onchange="toggleUnit()">
                <option value="thanh_pho">Cấp Thành phố</option>
                <option value="khu_vuc">Cấp Khu vực</option>
            </select>
        </div>

        <div class="form-group">
            <label>Đơn vị:</label>
            <select id="unit"></select>
        </div>

        <button class="btn-save" onclick="createUser()">TẠO TÀI KHOẢN MỚI</button>
    </div>

    <div class="container">
        <h3>Danh sách tài khoản</h3>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Họ tên</th>
                    <th>Cấp</th>
                    <th>Đơn vị</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        const currentUsername = localStorage.getItem('vks_username');
        if (currentUsername !== 'admin') {
            alert("Chỉ Admin mới được truy cập trang này!");
            window.location.href = "index.html";
        }

        function toggleUnit() {
            const level = document.getElementById('level').value;
            const unitSelect = document.getElementById('unit');
            unitSelect.innerHTML = '';
            if (level === 'thanh_pho') {
                ['Phòng 9', 'Phòng 10', 'Phòng 11', 'Phòng TT-KT'].forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u; opt.textContent = u;
                    unitSelect.appendChild(opt);
                });
            } else {
                for (let i = 1; i <= 14; i++) {
                    const opt = document.createElement('option');
                    opt.value = `Khu vực ${i}`; opt.textContent = `Khu vực ${i}`;
                    unitSelect.appendChild(opt);
                }
            }
        }

        function createUser() {
            const username = document.getElementById('username').value.trim();
            const fullname = document.getElementById('fullname').value.trim();
            const password = "123456"; // Mặc định
            const level = document.getElementById('level').value;
            const unit = document.getElementById('unit').value;

            if (!username || !fullname) {
                showMessage("Vui lòng nhập đầy đủ Username và Họ tên!", "error");
                return;
            }

            db.ref('users/' + username).once('value').then(snapshot => {
                if (snapshot.exists()) {
                    showMessage("Tài khoản này đã tồn tại!", "error");
                } else {
                    db.ref('users/' + username).set({
                        fullname: fullname,
                        password: password,
                        level: level,
                        unit: unit,
                        createdAt: Date.now()
                    }).then(() => {
                        showMessage("✅ Tạo tài khoản thành công! Mật khẩu mặc định: 123456", "success");
                        loadUsers();
                        // Reset form
                        document.getElementById('username').value = '';
                        document.getElementById('fullname').value = '';
                    });
                }
            });
        }

        function loadUsers() {
            db.ref('users').on('value', snapshot => {
                const users = snapshot.val() || {};
                let html = '';
                Object.keys(users).forEach(key => {
                    const u = users[key];
                    html += `<tr>
                        <td><strong>${key}</strong></td>
                        <td>${u.fullname || ''}</td>
                        <td>${u.level === 'thanh_pho' ? 'Thành phố' : 'Khu vực'}</td>
                        <td>${u.unit || ''}</td>
                        <td>
                            <button class="btn-reset" onclick="resetPassword('${key}')">Reset MK</button>
                            ${key !== 'admin' ? `<button class="btn-delete" onclick="deleteUser('${key}')">Xóa</button>` : ''}
                        </td>
                    </tr>`;
                });
                document.getElementById('table-body').innerHTML = html || '<tr><td colspan="5" style="text-align:center;color:#999">Chưa có tài khoản nào</td></tr>';
            });
        }

        function resetPassword(username) {
            if (confirm(`Reset mật khẩu của ${username} về 123456?`)) {
                db.ref('users/' + username).update({ password: "123456" }).then(() => {
                    showMessage(`Đã reset mật khẩu của ${username}`, "success");
                });
            }
        }

        function deleteUser(username) {
            if (username === 'admin') return alert("Không được xóa tài khoản Admin!");
            if (confirm(`XÓA tài khoản ${username}?`)) {
                db.ref('users/' + username).remove().then(() => loadUsers());
            }
        }

        function showMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            document.querySelector('.container').prepend(msg);
            setTimeout(() => msg.remove(), 4000);
        }

        window.onload = () => {
            toggleUnit();
            loadUsers();
        };
    </script>
</body>
</html>
