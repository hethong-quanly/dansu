<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tài khoản - VKSNDTC</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #0408c5; color: #f8f536; text-align: center; padding: 15px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 20px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 18px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #333; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 30px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #e0f2f1; color: #0408c5; }
        
        .btn-save { background: #5670e6; color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        .btn-reset { background: #ff9800; color: white; padding: 8px 14px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-delete { background: #d32f2f; color: white; padding: 8px 14px; border: none; border-radius: 5px; cursor: pointer; }
        
        .message { padding: 14px; margin: 15px 0; border-radius: 8px; text-align: center; font-weight: bold; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h1>VIỆN KIỂM SÁT NHÂN DÂN TỐI CAO</h1>
        <h2>QUẢN LÝ TÀI KHOẢN</h2>
    </header>

    <div class="container">
        <h3>Tạo tài khoản mới</h3>
        <div id="message"></div>

        <div class="form-group">
            <label>Tên đăng nhập (username):</label>
            <input type="text" id="username" placeholder="Ví dụ: cantho_kv1">
        </div>
        <div class="form-group">
            <label>Họ và tên:</label>
            <input type="text" id="fullname" placeholder="KV1-CANTHO">
        </div>

        <div class="form-group">
            <label>Cấp tài khoản:</label>
            <select id="level" onchange="toggleLevel()">
                <option value="toi_cao">VKSND Tối cao</option>
                <option value="tinh">Tỉnh / Thành phố</option>
                <option value="khuvuc">Khu vực</option>
            </select>
        </div>

        <!-- Cấp Tỉnh / Thành phố -->
        <div id="tinh_group" class="form-group" style="display:none;">
            <label>Tỉnh / Thành phố:</label>
            <select id="tinh_thanh"></select>
            
            <label>Chức vụ:</label>
            <select id="chuc_vu_tinh">
                <option value="Vien truong">Viện trưởng</option>
                <option value="Pho vien truong">Phó Viện trưởng</option>
                <option value="Kiem sat vien">Kiểm sát viên</option>
                <option value="Khac">Khác</option>
            </select>
        </div>

        <!-- Cấp Khu vực -->
        <div id="khuvuc_group" class="form-group" style="display:none;">
            <label>Khu vực:</label>
            <select id="khu_vuc"></select>
            
            <label>Phòng:</label>
            <select id="phong_khuvuc">
                <option value="Khu vuc 1">Khu vực 1</option> <option value="Khu vuc 2">Khu vực 2</option> <option value="Khu vuc 3">Khu vực 3</option> <option value="Khu vuc 4">Khu vực 4</option> <option value="Khu vuc 5">Khu vực 5</option> <option value="Khu vuc 6">Khu vực 6</option> <option value="Khu vuc 7">Khu vực 7</option> <option value="Khu vuc 8">Khu vực 8</option> <option value="Khu vuc 9">Khu vực 9</option> <option value="Khu vuc 10">Khu vực 10</option> 
                <option value="Khu vuc 11">Khu vực 11</option> <option value="Khu vuc 12">Khu vực 12</option> <option value="Khu vuc 13">Khu vực 13</option> <option value="Khu vuc 14">Khu vực 14</option> <option value="Khu vuc 15">Khu vực 15</option> <option value="Khu vuc 16">Khu vực 16</option> <option value="Khu vuc 18">Khu vực 18</option> <option value="Khu vuc 19">Khu vực 19</option> 
                <option value="Phong 9">Phòng 9</option>
                <option value="Phong 10">Phòng 10</option>
                <option value="Phong 11">Phòng 11</option>
                <option value="Phong 15">Phòng 15</option>
            </select>
            
            <label>Chức vụ:</label>
            <select id="chuc_vu_khuvuc">
                <option value="Truong phong">Trưởng phòng</option>
                <option value="Pho truong phong">Phó trưởng phòng</option>
                <option value="Kiem sat vien">Kiểm sát viên</option>
                <option value="Khac">Khác</option>
            </select>
        </div>

        <!-- Cấp Tối cao -->
        <div id="toicao_group" class="form-group" style="display:none;">
            <label>Chức vụ:</label>
            <select id="chuc_vu_toicao">
                <option value="Cuc truong">Cục trưởng</option>
                <option value="Vu truong">Vụ trưởng</option>
                <option value="Pho cuc truong">Phó Cục trưởng</option>
                <option value="Pho vu truong">Phó Vụ trưởng</option>
                <option value="Khac">Khác</option>
            </select>
        </div>

        <button class="btn-save" onclick="createUser()">TẠO TÀI KHOẢN MỚI</button>
    </div>

    <div class="container">
        <h3>Danh sách tài khoản</h3>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Họ tên</th>
                    <th>Cấp</th>
                    <th>Đơn vị</th>
                    <th>Chức vụ</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        // ================== KHỞI TẠO FIREBASE ==================
        var firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        let currentUser = null;

        // ================== KIỂM TRA QUYỀN ADMIN ==================
        function checkAdminPermission() {
            currentUser = JSON.parse(localStorage.getItem('vks_user') || '{}');
            
            if (!currentUser.username) {
                alert("Vui lòng đăng nhập trước!");
                window.location.href = "index.html";
                return false;
            }

            const isAdmin = 
                currentUser.username === "admin" || 
                currentUser.level === "toi_cao" ||
                (currentUser.position && 
                    (currentUser.position.includes("truong") || 
                     currentUser.position.includes("Vien truong") || 
                     currentUser.position.includes("Cuc truong") ||
                     currentUser.position.includes("Truong phong")));

            if (!isAdmin) {
                alert("Chỉ tài khoản Admin hoặc Lãnh đạo (Viện trưởng / Cục trưởng / Trưởng phòng) mới được truy cập trang này!");
                window.location.href = "index.html";
                return false;
            }
            return true;
        }

        // ================== TOGGLE CẤP TÀI KHOẢN ==================
        const provinces = ["Cần Thơ","Hà Nội","TP. Hồ Chí Minh","Đà Nẵng","Hải Phòng","An Giang","Bạc Liêu","Bến Tre","Cà Mau","Đồng Tháp","Hậu Giang","Kiên Giang","Long An","Sóc Trăng","Tiền Giang","Trà Vinh","Vĩnh Long","Khác"];

        function toggleLevel() {
            const level = document.getElementById('level').value;
            
            document.getElementById('tinh_group').style.display = 'none';
            document.getElementById('khuvuc_group').style.display = 'none';
            document.getElementById('toicao_group').style.display = 'none';

            if (level === 'tinh') {
                document.getElementById('tinh_group').style.display = 'block';
                const tinhSelect = document.getElementById('tinh_thanh');
                tinhSelect.innerHTML = '<option value="">-- Chọn Tỉnh/Thành phố --</option>';
                provinces.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p; opt.textContent = p;
                    tinhSelect.appendChild(opt);
                });
            } 
            else if (level === 'khuvuc') {
                document.getElementById('khuvuc_group').style.display = 'block';
                const kvSelect = document.getElementById('khu_vuc');
                kvSelect.innerHTML = '<option value="">-- Chọn Khu vực --</option>';
                for (let i = 1; i <= 14; i++) {
                    const opt = document.createElement('option');
                    opt.value = `Khu vực ${i}`; opt.textContent = `Khu vực ${i}`;
                    kvSelect.appendChild(opt);
                }
            } 
            else if (level === 'toi_cao') {
                document.getElementById('toicao_group').style.display = 'block';
            }
        }

        // ================== TẠO TÀI KHOẢN MỚI ==================
        function createUser() {
            const username = document.getElementById('username').value.trim();
            const fullname = document.getElementById('fullname').value.trim();
            const level = document.getElementById('level').value;

            if (!username || !fullname) {
                document.getElementById('message').innerHTML = `<div class="error">Vui lòng nhập Username và Họ tên!</div>`;
                return;
            }

            let unit = '', department = '', position = '';

            if (level === 'tinh') {
                unit = document.getElementById('tinh_thanh').value;
                position = document.getElementById('chuc_vu_tinh').value;
            } else if (level === 'khuvuc') {
                unit = document.getElementById('khu_vuc').value;
                department = document.getElementById('phong_khuvuc').value;
                position = document.getElementById('chuc_vu_khuvuc').value;
            } else if (level === 'toi_cao') {
                unit = 'VKSND Tối cao';
                position = document.getElementById('chuc_vu_toicao').value;
            }

            db.ref('users/' + username).once('value').then(snapshot => {
                if (snapshot.exists()) {
                    document.getElementById('message').innerHTML = `<div class="error">Tài khoản này đã tồn tại!</div>`;
                } else {
                    db.ref('users/' + username).set({
                        fullname: fullname,
                        password: "123456",
                        level: level,
                        unit: unit,
                        department: department || null,
                        position: position,
                        createdAt: Date.now()
                    }).then(() => {
                        document.getElementById('message').innerHTML = `<div class="success">✅ Tạo tài khoản thành công!<br>Mật khẩu mặc định: <strong>123456</strong></div>`;
                        loadUsers();
                        // Reset form
                        document.getElementById('username').value = '';
                        document.getElementById('fullname').value = '';
                    });
                }
            });
        }

        // ================== LOAD DANH SÁCH TÀI KHOẢN ==================
        function loadUsers() {
            db.ref('users').on('value', snapshot => {
                const users = snapshot.val() || {};
                let html = '';
                
                Object.keys(users).forEach(key => {
                    const u = users[key];
                    let capText = u.level === 'toi_cao' ? 'Cấp Tối cao' : 
                                  u.level === 'tinh' ? 'Cấp Tỉnh/TP' : 'Cấp Khu vực';

                    html += `<tr>
                        <td><strong>${key}</strong></td>
                        <td>${u.fullname || ''}</td>
                        <td>${capText}</td>
                        <td>${u.unit || ''}</td>
                        <td>${u.position || ''}</td>
                        <td>
                            <button class="btn-reset" onclick="resetPassword('${key}')">Reset MK</button>
                            ${key !== 'admin' ? `<button class="btn-delete" onclick="deleteUser('${key}')">Xóa</button>` : ''}
                        </td>
                    </tr>`;
                });

                document.getElementById('table-body').innerHTML = html || 
                    '<tr><td colspan="6" style="text-align:center;color:#999">Chưa có tài khoản nào</td></tr>';
            });
        }

        function resetPassword(username) {
            if (confirm(`Reset mật khẩu của ${username} về 123456?`)) {
                db.ref('users/' + username).update({ password: "123456" }).then(() => {
                    alert(`Đã reset mật khẩu của ${username}`);
                });
            }
        }

        function deleteUser(username) {
            if (username === 'admin') return alert("Không được xóa tài khoản Admin!");
            if (confirm(`XÓA tài khoản ${username}?`)) {
                db.ref('users/' + username).remove().then(() => loadUsers());
            }
        }

        // ================== KHỞI ĐỘNG ==================
        window.onload = () => {
            if (!checkAdminPermission()) return;
            toggleLevel();
            loadUsers();
        };
    </script>
</body>
</html>
