<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tài khoản</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #0408c5; color: #f8f536; text-align: center; padding: 15px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 20px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; }
        
        .container { display: flex; padding: 20px; gap: 25px; }
        .left-panel { flex: 1; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .right-panel { flex: 1; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #e0f2f1; color: #0408c5; }
        
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 10px 16px; margin: 5px 0; border: none; border-radius: 6px; cursor: pointer; }
        .btn-save { background: #5670e6; color: white; width: 100%; }
        .btn-reset { background: #ff9800; color: white; }
        .btn-delete { background: #d32f2f; color: white; }
        .current-user { background: #e8f5e9; font-weight: bold; }
        
        .message { padding: 10px; margin: 10px 0; border-radius: 6px; text-align: center; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h2>QUẢN LÝ TÀI KHOẢN</h2>
    </header>

    <div class="container">
        <!-- DANH SÁCH TÀI KHOẢN -->
        <div class="left-panel">
            <h3>Danh sách tài khoản</h3>
            <div id="message" class="message" style="display:none;"></div>
            <table id="user-table">
                <thead>
                    <tr>
                        <th>Tài khoản</th>
                        <th>Họ tên</th>
                        <th>Cấp</th>
                        <th>Đơn vị</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <!-- FORM TẠO TÀI KHOẢN MỚI -->
        <div class="right-panel">
            <h3>Tạo tài khoản mới</h3>
            <input type="text" id="new_username" placeholder="Tên đăng nhập (username)">
            <input type="text" id="new_fullname" placeholder="Họ và tên">
            <select id="level" onchange="toggleUnit()">
                <option value="thanh_pho">Cấp Thành phố</option>
                <option value="khu_vuc">Cấp Khu vực</option>
            </select>
            <select id="unit"></select>
            <select id="role">
                <option value="staff">Cán bộ cập nhật</option>
                <option value="leader">Lãnh đạo (chỉ xem)</option>
            </select>
            <button class="btn-save" onclick="createUser()">TẠO TÀI KHOẢN</button>
        </div>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        const currentUser = JSON.parse(localStorage.getItem('vks_user') || '{}');
        if (currentUser.username !== 'admin') {
            alert("Chỉ tài khoản Admin mới được truy cập trang này!");
            window.location.href = "index.html";
        }

        const provinces = [
            {code:"79", name:"Cần Thơ"}, {code:"01", name:"Hà Nội"}, {code:"79", name:"TP. Hồ Chí Minh"},
            // ... bạn có thể bổ sung đầy đủ 34 tỉnh sau
        ];

        function toggleUnit() {
            const level = document.getElementById('level').value;
            const unitSelect = document.getElementById('unit');
            unitSelect.innerHTML = '';
            if (level === 'thanh_pho') {
                ['Phòng 9', 'Phòng 10', 'Phòng 11', 'Phòng TT-KT'].forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u; opt.textContent = u;
                    unitSelect.appendChild(opt);
                });
            } else {
                for (let i = 1; i <= 14; i++) {
                    const opt = document.createElement('option');
                    opt.value = `Khu vực ${i}`; opt.textContent = `Khu vực ${i}`;
                    unitSelect.appendChild(opt);
                }
            }
        }

        function createUser() {
            const username = document.getElementById('new_username').value.trim();
            const fullname = document.getElementById('new_fullname').value.trim();
            const level = document.getElementById('level').value;
            const unit = document.getElementById('unit').value;
            const role = document.getElementById('role').value;

            if (!username || !fullname) {
                showMessage("Vui lòng nhập đầy đủ thông tin!", "error");
                return;
            }

            db.ref('users/' + username).once('value').then(snapshot => {
                if (snapshot.exists()) {
                    showMessage("Tài khoản này đã tồn tại!", "error");
                } else {
                    db.ref('users/' + username).set({
                        fullname: fullname,
                        level: level,
                        unit: unit,
                        role: role,
                        password: "123456",   // Mật khẩu mặc định
                        createdBy: currentUser.username,
                        timestamp: Date.now()
                    }).then(() => {
                        showMessage("✅ Tạo tài khoản thành công! Mật khẩu mặc định: 123456", "success");
                        loadUsers();
                        // Reset form
                        document.getElementById('new_username').value = '';
                        document.getElementById('new_fullname').value = '';
                    });
                }
            });
        }

        function loadUsers() {
            db.ref('users').on('value', snapshot => {
                const users = snapshot.val();
                let html = '';
                if (users) {
                    Object.keys(users).forEach(username => {
                        const u = users[username];
                        const isCurrent = username === currentUser.username;
                        html += `
                            <tr class="${isCurrent ? 'current-user' : ''}">
                                <td><strong>${username}</strong></td>
                                <td>${u.fullname || ''}</td>
                                <td>${u.level === 'thanh_pho' ? 'Thành phố' : 'Khu vực'}</td>
                                <td>${u.unit || ''}</td>
                                <td>
                                    ${isCurrent ? '' : `<button class="btn-reset" onclick="resetPassword('${username}')">Reset MK</button>`}
                                    ${isCurrent ? '' : `<button class="btn-delete" onclick="deleteUser('${username}')">Xóa</button>`}
                                    <button onclick="window.location.href='doi_mk.html'" style="background:#2196f3;color:white;">Đổi MK</button>
                                </td>
                            </tr>`;
                    });
                }
                document.getElementById('table-body').innerHTML = html || '<tr><td colspan="5" style="text-align:center;color:#999">Chưa có tài khoản nào</td></tr>';
            });
        }

        function resetPassword(username) {
            if (confirm(`Reset mật khẩu của ${username} về 123456?`)) {
                db.ref('users/' + username).update({ password: "123456" }).then(() => {
                    showMessage(`Đã reset mật khẩu của ${username} thành 123456`, "success");
                });
            }
        }

        function deleteUser(username) {
            if (username === 'admin') {
                alert("Không được xóa tài khoản Admin!");
                return;
            }
            if (confirm(`XÓA tài khoản ${username}? Hành động này không thể hoàn tác!`)) {
                db.ref('users/' + username).remove().then(() => {
                    showMessage(`Đã xóa tài khoản ${username}`, "success");
                });
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 4000);
        }

        window.onload = () => {
            toggleUnit();
            loadUsers();
        };
    </script>
</body>
</html>
