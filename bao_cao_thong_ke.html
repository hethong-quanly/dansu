<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Báo cáo Thống kê Tổng hợp</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family:'Segoe UI',sans-serif; margin:0; background:#f5f7fa; }
        header { background:#0408c5; color:#f8f536; padding:15px; text-align:center; position:relative; }
        .btn-back { position:absolute; left:20px; top:20px; color:white; text-decoration:none; background:rgba(255,255,255,0.2); padding:8px 16px; border-radius:6px; }
        .container { max-width:1100px; margin:30px auto; padding:25px; background:white; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
        h2 { color:#0408c5; text-align:center; }
        select, input, button { padding:12px; margin:8px 0; border-radius:8px; font-size:15px; width:100%; }
        button { border:none; font-weight:bold; cursor:pointer; }
        .btn-blue { background:#1e88e5; color:white; }
        .btn-green { background:#43a047; color:white; }
        .btn-orange { background:#f57c00; color:white; }
        .section { margin:25px 0; padding:20px; background:#f9f9f9; border-radius:10px; }
        table { width:100%; border-collapse:collapse; margin-top:15px; }
        th, td { border:1px solid #ddd; padding:10px; text-align:left; }
        th { background:#e0f2f1; }
        .result { margin-top:20px; padding:15px; background:#f0f4ff; border-radius:8px; min-height:200px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h2>BÁO CÁO THỐNG KÊ TỔNG HỢP</h2>
    </header>

    <div class="container">
        <div class="section">
            <h3>Chọn loại báo cáo</h3>
            <select id="reportType">
                <option value="an_dan_su">Án Dân sự, HN-GĐ, KD-TM, HC, Lao động,...</option>
                <option value="thi_hanh_an">Kiểm sát Thi hành án Dân sự</option>
                <option value="don_khieu_to">Kiểm sát, giải quyết Khiếu nại - Tố cáo</option>
            </select>

            <button class="btn-blue" onclick="generateReport()">📊 Xem báo cáo</button>
            <button class="btn-green" onclick="exportToExcel()">📥 Xuất Excel</button>
        </div>

        <div id="resultArea" class="result">
            Chọn loại báo cáo và nhấn "Xem báo cáo" để xem kết quả theo đơn vị của bạn.
        </div>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        let currentUser = null;
        let currentData = [];   // dùng để xuất Excel

        function checkLogin() {
            currentUser = JSON.parse(localStorage.getItem('vks_user') || '{}');
            if (!currentUser.username) {
                alert("Vui lòng đăng nhập trước!");
                window.location.href = "index.html";
                return false;
            }
            return true;
        }

        async function generateReport() {
            if (!checkLogin()) return;

            const type = document.getElementById('reportType').value;
            let refPath = '';
            let title = '';

            if (type === 'an_dan_su') { refPath = 'an_dan_su'; title = 'Án Dân sự'; }
            else if (type === 'thi_hanh_an') { refPath = 'thi_hanh_an'; title = 'Thi hành án Dân sự'; }
            else if (type === 'don_khieu_to') { refPath = 'don_khieu_to'; title = 'Đơn Khiếu nại - Tố cáo'; }

            const snap = await db.ref(refPath).once('value');
            const datas = snap.val() || {};
            currentData = [];

            let html = `<h3>Báo cáo ${title} - ${currentUser.unit || 'Toàn hệ thống'}</h3>`;
            html += `<table><tr><th>STT</th><th>Ngày</th><th>Nội dung chính</th><th>Người tạo</th></tr>`;

            let count = 0;

            Object.keys(datas).forEach(key => {
                const item = datas[key];

                const canView = currentUser.level === 'toi_cao' || 
                               (item.unit && item.unit === currentUser.unit) ||
                               (item.createdBy && item.createdBy === currentUser.username);

                if (!canView) return;

                count++;
                const ngay = item.ngay_nhan || item.ngay_thu_ly || item.ngay_nhan_qd || 'Không rõ';
                const tomTat = (item.noi_dung || item.noi_dung_tha || item.ho_ten || '').substring(0, 80) + '...';

                html += `<tr>
                    <td>${count}</td>
                    <td>${ngay}</td>
                    <td>${tomTat}</td>
                    <td>${item.createdBy || 'N/A'}</td>
                </tr>`;

                currentData.push({
                    STT: count,
                    Ngay: ngay,
                    NoiDung: tomTat,
                    NguoiTao: item.createdBy || 'N/A',
                    DonVi: item.unit || ''
                });
            });

            html += `</table><p><strong>Tổng số: ${count} hồ sơ</strong></p>`;

            document.getElementById('resultArea').innerHTML = html || '<p>Không có dữ liệu thuộc thẩm quyền của bạn.</p>';
        }

        function exportToExcel() {
            if (currentData.length === 0) {
                alert("Vui lòng xem báo cáo trước khi xuất Excel!");
                return;
            }
            const ws = XLSX.utils.json_to_sheet(currentData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
            XLSX.writeFile(wb, `BaoCao_${document.getElementById('reportType').options[document.getElementById('reportType').selectedIndex].text}_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        window.onload = () => {
            checkLogin();
        };
    </script>
</body>
</html>
