<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Báo cáo thống kê - VKSND</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #0408c5; color: #f8f536; text-align: center; padding: 20px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 25px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 16px; margin: 12px 0; background: #5670e6; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #0408c5; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h2>📊 BÁO CÁO THỐNG KÊ THEO BIỂU MẪU VKSND</h2>
    </header>

    <div class="container">
        <h3>Chọn biểu mẫu cần xuất Excel</h3>
        
        <button onclick="xuatBieu10()">📄 Biểu 10/2013 - Án dân sự sơ thẩm</button>
        <button onclick="xuatBieu11()">📄 Biểu 11/2013 - Án dân sự phúc thẩm</button>
        <button onclick="xuatBieu12()">📄 Biểu 12/2013 - Án dân sự giám đốc thẩm, tái thẩm</button>
        <button onclick="xuatBieu13()">📄 Biểu 13/2013 - Án hành chính</button>
        <button onclick="xuatBieu19()">📄 Biểu 19/2013 - Phá sản doanh nghiệp</button>

        <p style="margin-top:40px; text-align:center; color:#555;">
            Dữ liệu được lấy tự động từ hệ thống.<br>
            File Excel sẽ có định dạng đúng theo quy định của Viện Kiểm sát.
        </p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function xuatBieu10() {
            if (!confirm("Xuất Biểu 10/2013 - Án dân sự sơ thẩm?")) return;
            db.ref('an_dan_su').once('value').then(snapshot => {
                const count = Object.keys(snapshot.val() || {}).length;
                const rows = [
                    ["Mã dòng", "Chỉ tiêu", "Số liệu"],
                    ["1", "Số vụ việc còn lại kỳ trước", "0"],
                    ["2", "Số vụ việc mới nhận", count],
                    ["15", "Số vụ việc Tòa án đã giải quyết", count],
                    ["20", "Số vụ việc đang giải quyết", count]
                ];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Bieu10");
                XLSX.writeFile(wb, "Bieu_10_An_dan_su.xlsx");
                alert("✅ Đã xuất Biểu 10/2013 thành công!");
            });
        }

        function xuatBieu11() { alert("Biểu 11/2013 (Phúc thẩm) đang phát triển..."); }
        function xuatBieu12() { alert("Biểu 12/2013 (Giám đốc thẩm, Tái thẩm) đang phát triển..."); }
        function xuatBieu13() { alert("Biểu 13/2013 (Hành chính) đang phát triển..."); }
        function xuatBieu19() { alert("Biểu 19/2013 (Phá sản) đang phát triển..."); }
    </script>
</body>
</html>
