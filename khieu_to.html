<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self'; 
                 style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; 
                 script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://*.googleapis.com https://*.firebaseio.com https://*.firebasedatabase.app https://*.jsdelivr.net; 
                 connect-src 'self' https://www.gstatic.com https://*.googleapis.com https://*.firebaseio.com https://*.firebasedatabase.app wss://*.firebaseio.com wss://*.firebasedatabase.app https://*.jsdelivr.net;
                 img-src 'self' data: https://vienkiemsat.cantho.gov.vn https://upload.wikimedia.org blob:;">

    <title>Hệ thống Quản Lý công tác Khiếu tố</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    
    <style>
        /* === GIỮ NGUYÊN TOÀN BỘ CSS CỦA BẠN === */
        body {
            font-family: 'Segoe UI', 'Times New Roman', sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        }
        header {
            width: 100%;
            padding: 0px;
            background-color: #0408c5;
            color: rgb(248, 245, 54);
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        #login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #E6F7FF;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            margin: auto;
            position: absolute;
            top: 63%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        /* ... (Bạn copy nguyên phần CSS còn lại từ file cũ của bạn vào đây) ... */
        /* Tôi giữ ngắn để dễ copy, bạn paste toàn bộ CSS cũ vào sau dòng này */
    </style>
</head>
<body>
    <header>
        <h1>VIỆN KIỂM SÁT NHÂN DÂN THÀNH PHỐ CẦN THƠ</h1>
        <h2>QUẢN LÝ CÔNG TÁC KHIẾU TỐ - KIỂM SÁT HOẠT ĐỘNG TƯ PHÁP</h2>
    </header>

    <!-- Phần đăng nhập -->
    <div id="login-container">
        <img src="https://vienkiemsat.cantho.gov.vn/files/images/logo-vks.png" alt="Logo Viện Kiểm Sát" style="width: 120px; margin-bottom: 30px;">
        <h2>ĐĂNG NHẬP</h2>
        <input type="text" id="username" placeholder="Tên đăng nhập">
        <input type="password" id="password" placeholder="Mật khẩu">
        <button onclick="login()">Đăng Nhập</button>
        <p><a href="#" onclick="handleForgotPassword()">Quên mật khẩu?</a></p>
        <div class="footer-login"><p>Cần Thơ ®2025</p></div>
    </div>

    <!-- Phần chính sau khi đăng nhập -->
    <div id="main-container" style="display:none;">
        <nav id="main-menu">
            <button id="menu-btn-thuly" class="active" onclick="showSection('thuly')">Thụ lý đơn</button>
            <button id="menu-btn-giaiquyet" onclick="showSection('giaiquyet')">Đơn thuộc thẩm quyền giải quyết</button>
            <button id="menu-btn-kiemsat" onclick="showSection('kiemsat')">Kiểm sát hoạt động tư pháp</button>
            <button id="menu-btn-vanban" onclick="showSection('vanban')">Ban hành văn bản</button>
            <button onclick="showReportModal()">Báo cáo Thống kê</button>
        </nav>

        <!-- === THỤ LÝ ĐƠN === -->
        <div id="thuly-section" class="section-content" style="display: flex;">
            <div class="sidebar">
                <div id="top-right-buttons">
                    <button onclick="logout()">Đăng xuất</button>
                </div>  
                <h2>Nhập đơn mới</h2>
                <!-- Giữ nguyên toàn bộ form nhập liệu của bạn -->
                <div class="form-section">
                    <div class="form-group">
                        <label for="ngay_nhan">Ngày nhận đơn:</label>
                        <input type="date" id="ngay_nhan">
                    </div>
                    <div class="form-group">
                        <label for="nguon_don">Nguồn đơn:</label>
                        <select id="nguon_don"></select>
                    </div>
                </div>
                <!-- ... copy tiếp toàn bộ form từ file cũ của bạn ... -->
                <!-- (Để ngắn, bạn copy phần form từ <div class="form-section"> đến nút "Kết thúc nhập" của file cũ) -->

                <button onclick="saveDon()">Kết thúc nhập / Lưu đơn</button>
            </div>

            <div class="main-panel">
                <h2>DANH SÁCH THỤ LÝ, THEO DÕI ĐƠN</h2>
                <table>
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Ngày nhận đơn</th>
                            <th>Họ tên /CQ/ TC</th>
                            <th>Nội dung đơn</th>
                            <th>Phân loại</th>
                            <th>Thẩm quyền</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="don-body"></tbody>
                </table>
            </div>
        </div>

        <!-- Các section khác (giaiquyet, kiemsat, vanban) bạn giữ nguyên từ file cũ -->
        <!-- Nếu muốn, bạn có thể copy nguyên từ file cũ vào đây -->

    </div>

    <script>
        // ================== FIREBASE CONFIG ==================
        var firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        let currentUser = null;
        let dons = [];
        let currentSelectedId = null;

        // ================== CHECK LOGIN ==================
        function checkLogin() {
            currentUser = JSON.parse(localStorage.getItem('vks_user') || '{}');
            if (!currentUser.username) {
                alert("Vui lòng đăng nhập trước!");
                window.location.href = "index.html";
                return false;
            }
            return true;
        }

        // ================== LOGIN ==================
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert('Vui lòng nhập tên đăng nhập và mật khẩu.');
                return;
            }

            db.ref('users/' + username).once('value').then(snapshot => {
                const account = snapshot.val();
                if (account && account.password === password) {
                    currentUser = {
                        username: username,
                        fullname: account.fullname || username,
                        level: account.level || 'user',
                        unit: account.unit || 'Cần Thơ',
                        position: account.position || ''
                    };
                    localStorage.setItem('vks_user', JSON.stringify(currentUser));
                    localStorage.setItem('vks_logged_in', 'true');

                    document.getElementById('login-container').style.display = 'none';
                    document.getElementById('main-container').style.display = 'flex';

                    populateSelects();
                    loadData();
                } else {
                    alert('Tên đăng nhập hoặc mật khẩu không đúng.');
                }
            }).catch(() => alert('Lỗi kết nối Firebase!'));
        }

        function logout() {
            if (confirm('Đăng xuất?')) {
                localStorage.clear();
                location.reload();
            }
        }

        // ================== LƯU ĐƠN (THÊM createdBy + unit) ==================
        function saveDon() {
            if (!checkLogin()) return;

            const donData = {
                ngay_nhan: document.getElementById('ngay_nhan').value,
                nguon_don: document.getElementById('nguon_don').value,
                ho_ten: document.getElementById('ho_ten').value,
                dia_chi: document.getElementById('dia_chi').value,
                phan_loai: document.getElementById('phan_loai').value,
                tham_quyen: document.getElementById('tham_quyen').value,
                noi_dung: document.getElementById('noi_dung').value,
                de_xuat: document.getElementById('de_xuat').value,
                ket_qua: document.getElementById('ket_qua').value,
                can_bo_phan_cong: document.getElementById('can_bo_phan_cong').value || currentUser.username,
                createdBy: currentUser.username,
                unit: currentUser.unit || "Cần Thơ",
                timestamp: Date.now()
            };

            const donId = document.getElementById('edit-id') ? document.getElementById('edit-id').value : '';

            if (donId) {
                db.ref('don_khieu_to/' + donId).update(donData).then(() => {
                    alert('Cập nhật đơn thành công!');
                    loadData();
                });
            } else {
                db.ref('don_khieu_to').push(donData).then(() => {
                    alert('Lưu đơn thành công!');
                    loadData();
                });
            }
        }

        // ================== LOAD & FILTER ==================
        function loadData() {
            if (!checkLogin()) return;

            db.ref('don_khieu_to').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                dons = Object.keys(data).map(id => ({ id, ...data[id] }));
                updateTable(dons);
            });
        }

        function updateTable(filteredDons = dons) {
            const tbody = document.getElementById('don-body');
            tbody.innerHTML = '';

            const finalDons = filteredDons.filter(don => {
                return currentUser.level === 'toi_cao' || 
                       (don.unit && don.unit === currentUser.unit) ||
                       (don.createdBy && don.createdBy === currentUser.username);
            });

            finalDons.forEach((don, index) => {
                const row = tbody.insertRow();
                row.insertCell().textContent = index + 1;
                row.insertCell().textContent = don.ngay_nhan || '';
                row.insertCell().textContent = don.ho_ten || '';
                row.insertCell().textContent = (don.noi_dung || '').substring(0, 50) + '...';
                row.insertCell().textContent = don.phan_loai || '';
                row.insertCell().textContent = don.tham_quyen || '';

                const act = row.insertCell();
                act.innerHTML = `
                    <button class="edit-btn" onclick="editDon('${don.id}')">Sửa</button>
                    <button class="delete-btn" onclick="deleteDon('${don.id}')">Xóa</button>
                `;
            });
        }

        // Các hàm khác (editDon, deleteDon, populateSelects, showSection, v.v.) bạn giữ nguyên từ file cũ
        // Nếu thiếu hàm nào gây lỗi, bạn báo mình, mình bổ sung thêm.

        // Khởi tạo khi load trang
        window.onload = () => {
            if (localStorage.getItem('vks_logged_in') === 'true') {
                checkLogin();
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('main-container').style.display = 'flex';
                populateSelects();
                loadData();
            }
        };
    </script>
</body>
</html>
