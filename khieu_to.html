<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản Lý công tác Khiếu tố</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    
    <style>
        /* === GIỮ NGUYÊN CSS CỦA BẠN === */
        body { font-family: 'Segoe UI', 'Times New Roman', sans-serif; margin: 0; padding: 0; color: #333; background: linear-gradient(135deg, #f5f7fa, #c3cfe2); }
        header { width: 100%; padding: 10px; background-color: #0408c5; color: rgb(248, 245, 54); text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #E6F7FF; padding: 25px; border-radius: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 400px; margin: 100px auto; }
        #main-container { display: none; width: 100%; max-width: 1300px; margin: 20px auto; padding: 20px; }
        .section-content { display: none; }
        .sidebar, .main-panel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #e0f2f1; }
        button { padding: 8px 12px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-save { background: #5670e6; color: white; }
    </style>
</head>
<body>
    <header>
        <h1>VIỆN KIỂM SÁT NHÂN DÂN THÀNH PHỐ CẦN THƠ</h1>
        <h2>QUẢN LÝ CÔNG TÁC KHIẾU TỐ - KIỂM SÁT HOẠT ĐỘNG TƯ PHÁP</h2>
    </header>

    <!-- Login -->
    <div id="login-container">
        <img src="https://vienkiemsat.cantho.gov.vn/files/images/logo-vks.png" alt="Logo" style="width:120px; margin-bottom:20px;">
        <h2>ĐĂNG NHẬP</h2>
        <input type="text" id="username" placeholder="Tên đăng nhập">
        <input type="password" id="password" placeholder="Mật khẩu">
        <button onclick="login()" style="width:100%; padding:12px; background:#5670e6; color:white; border:none; border-radius:5px;">Đăng Nhập</button>
    </div>

    <!-- Main App -->
    <div id="main-container">
        <nav style="margin-bottom:15px;">
            <button onclick="showSection('thuly')" style="background:#5670e6;color:white;">Thụ lý đơn</button>
            <button onclick="showSection('giaiquyet')">Giải quyết</button>
            <button onclick="showSection('kiemsat')">Kiểm sát</button>
            <button onclick="logout()" style="float:right; background:#d32f2f;color:white;">Đăng xuất</button>
        </nav>

        <!-- THỤ LÝ ĐƠN -->
        <div id="thuly-section" class="section-content" style="display:flex; gap:20px;">
            <div class="sidebar" style="flex:1;">
                <h3>Nhập đơn mới</h3>
                <div class="form-group"><label>Ngày nhận đơn:</label><input type="date" id="ngay_nhan"></div>
                <div class="form-group"><label>Họ tên / Cơ quan:</label><input type="text" id="ho_ten"></div>
                <div class="form-group"><label>Phân loại:</label>
                    <select id="phan_loai">
                        <option value="Khiếu nại">Khiếu nại</option>
                        <option value="Tố cáo">Tố cáo</option>
                    </select>
                </div>
                <div class="form-group"><label>Nội dung đơn:</label><textarea id="noi_dung" rows="5"></textarea></div>
                <button onclick="saveDon()" class="btn-save">Lưu đơn</button>
            </div>

            <div class="main-panel" style="flex:2;">
                <h3>Danh sách đơn</h3>
                <table>
                    <thead><tr><th>STT</th><th>Ngày nhận</th><th>Họ tên</th><th>Phân loại</th><th>Nội dung</th><th>Thao tác</th></tr></thead>
                    <tbody id="don-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        let currentUser = null;
        let dons = [];

        function checkLogin() {
            currentUser = JSON.parse(localStorage.getItem('vks_user') || '{}');
            if (!currentUser.username) {
                alert("Vui lòng đăng nhập trước!");
                window.location.href = "index.html";
                return false;
            }
            return true;
        }

        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            db.ref('users/' + username).once('value').then(snapshot => {
                const acc = snapshot.val();
                if (acc && acc.password === password) {
                    currentUser = { username, unit: acc.unit || "Cần Thơ", level: acc.level || "user" };
                    localStorage.setItem('vks_user', JSON.stringify(currentUser));
                    document.getElementById('login-container').style.display = 'none';
                    document.getElementById('main-container').style.display = 'block';
                    loadData();
                } else {
                    alert("Sai tài khoản hoặc mật khẩu!");
                }
            });
        }

        function saveDon() {
            if (!checkLogin()) return;

            const data = {
                ngay_nhan: document.getElementById('ngay_nhan').value,
                ho_ten: document.getElementById('ho_ten').value,
                phan_loai: document.getElementById('phan_loai').value,
                noi_dung: document.getElementById('noi_dung').value,
                createdBy: currentUser.username,
                unit: currentUser.unit,
                timestamp: Date.now()
            };

            db.ref('don_khieu_to').push(data).then(() => {
                alert("Lưu đơn thành công!");
                loadData();
            });
        }

        function loadData() {
            db.ref('don_khieu_to').on('value', snapshot => {
                const data = snapshot.val() || {};
                dons = Object.keys(data).map(k => ({id: k, ...data[k]}));
                updateTable();
            });
        }

        function updateTable() {
            const tbody = document.getElementById('don-body');
            tbody.innerHTML = '';

            dons.filter(d => 
                currentUser.level === 'toi_cao' || d.unit === currentUser.unit || d.createdBy === currentUser.username
            ).forEach((don, i) => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${i+1}</td>
                    <td>${don.ngay_nhan || ''}</td>
                    <td>${don.ho_ten || ''}</td>
                    <td>${don.phan_loai || ''}</td>
                    <td>${(don.noi_dung || '').substring(0,60)}...</td>
                    <td><button onclick="alert('Chức năng sửa/xóa đang hoàn thiện')">Thao tác</button></td>
                `;
            });
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        window.onload = () => {
            if (localStorage.getItem('vks_logged_in') === 'true') {
                checkLogin();
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('main-container').style.display = 'block';
                loadData();
            }
        };
    </script>
</body>
</html>
