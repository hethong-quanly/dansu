<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Khiếu nại, Tố cáo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #0408c5; color: #f8f536; text-align: center; padding: 15px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 25px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; }
        .container { display: flex; padding: 20px; gap: 25px; }
        .sidebar { flex: 1.3; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .main-panel { flex: 2.5; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-y: auto; }
        
        .form-group { margin-bottom: 16px; }
        label { font-weight: bold; margin-bottom: 6px; color: #333; display: block; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
        th { background: #e0f2f1; color: #0408c5; }
        
        .btn-save { background: #5670e6; color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        .btn-edit { background: #ff9800; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; margin-right: 5px; }
        .btn-delete { background: #d32f2f; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        .btn-pdf { background: #4caf50; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        
        .section { background: #f0f4ff; padding: 15px; border-radius: 8px; margin: 15px 0; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h2>QUẢN LÝ GIẢI QUYẾT KHIẾU NẠI, TỐ CÁO</h2>
    </header>

    <div class="container">
        <div class="sidebar">
            <h3>Nhập đơn Khiếu tố mới</h3>
            
            <div class="form-group"><label>Ngày nhận đơn:</label><input type="date" id="ngay_nhan"></div>
            <div class="form-group">
                <label>Nguồn đơn:</label>
                <select id="nguon_don">
                    <option value="Bưu điện">Bưu điện</option>
                    <option value="Tiếp công dân">Tiếp công dân</option>
                    <option value="Cơ quan Đảng, Nhà nước">Cơ quan Đảng, Nhà nước</option>
                    <option value="Báo chí">Báo chí</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>
            <div class="form-group"><label>Họ tên / Cơ quan:</label><input type="text" id="ho_ten"></div>
            <div class="form-group"><label>Địa chỉ:</label><input type="text" id="dia_chi"></div>

            <div class="form-group">
                <label>Nội dung đơn:</label>
                <textarea id="noi_dung" rows="5"></textarea>
            </div>

            <div class="form-group">
                <label>Phân loại:</label>
                <select id="phan_loai">
                    <option value="Khiếu nại">Khiếu nại</option>
                    <option value="Tố cáo">Tố cáo</option>
                    <option value="Kiến nghị/Phản ánh">Kiến nghị/Phản ánh</option>
                    <option value="Dan su">Dân sự</option>
                    <option value="Thi hanh an">Thi hành án</option>
                    <option value="Khac">Khác</option>
                </select>
            </div>

            <div class="form-group">
                <label>Đề xuất xử lý:</label>
                <textarea id="de_xuat_tu_dien" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>Đính kèm File PDF:</label>
                <input type="file" id="pdf_file" accept=".pdf">
            </div>

            <button class="btn-save" onclick="saveData()" id="btn-save">LƯU ĐƠN</button>
        </div>

        <div class="main-panel">
            <h3>DANH SÁCH ĐƠN KHIẾU NẠI, TỐ CÁO</h3>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Ngày nhận</th>
                        <th>Nguồn đơn</th>
                        <th>Người nộp đơn</th>
                        <th>Phân loại</th>
                        <th>Nội dung tóm tắt</th>
                        <th>File PDF</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ================== FIREBASE ==================
        var firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        var storage = firebase.storage();

        let editingKey = null;
        let currentUser = null;

        function checkLogin() {
            currentUser = JSON.parse(localStorage.getItem('vks_user') || '{}');
            if (!currentUser.username) {
                alert("Vui lòng đăng nhập trước!");
                window.location.href = "index.html";
                return false;
            }
            return true;
        }

        // ================== LƯU ĐƠN ==================
        function saveData() {
            if (!checkLogin()) return;

            const file = document.getElementById('pdf_file').files[0];

            const data = {
                ngay_nhan: document.getElementById('ngay_nhan').value,
                nguon_don: document.getElementById('nguon_don').value,
                ho_ten: document.getElementById('ho_ten').value,
                dia_chi: document.getElementById('dia_chi').value,
                noi_dung: document.getElementById('noi_dung').value,
                phan_loai: document.getElementById('phan_loai').value,
                de_xuat_tu_dien: document.getElementById('de_xuat_tu_dien').value,
                createdBy: currentUser.username,
                unit: currentUser.unit || "Cần Thơ",
                timestamp: Date.now()
            };

            if (file) {
                const storageRef = storage.ref('pdf_khieuto/' + Date.now() + '_' + file.name);
                storageRef.put(file).then(snapshot => {
                    snapshot.ref.getDownloadURL().then(url => {
                        data.pdf_url = url;
                        saveToDatabase(data);
                    });
                });
            } else {
                saveToDatabase(data);
            }
        }

        function saveToDatabase(data) {
            if (editingKey) {
                db.ref('don_khieu_to/' + editingKey).update(data).then(() => {
                    handleTransfer(data);
                    alert("Cập nhật đơn thành công!");
                    resetForm();
                });
            } else {
                db.ref('don_khieu_to').push(data).then(() => {
                    handleTransfer(data);
                    alert("Lưu đơn thành công!");
                    resetForm();
                });
            }
        }

        // Chuyển dữ liệu sang module khác
        function handleTransfer(data) {
            if (data.phan_loai === "Dan su") {
                const danSuData = {
                    cap_thu_ly: "So tham",
                    ngay_thu_ly: data.ngay_nhan,
                    noi_dung: data.noi_dung,
                    ho_ten: data.ho_ten,
                    createdBy: data.createdBy,
                    unit: data.unit,
                    timestamp: Date.now()
                };
                db.ref('an_dan_su').push(danSuData);
                alert("Đã chuyển dữ liệu sang phần Án Dân sự!");
            } 
            else if (data.phan_loai === "Thi hanh an") {
                const thaData = {
                    ngay_nhan_qd: data.ngay_nhan,
                    nguoi_phai_tha: data.ho_ten,
                    noi_dung_tha: data.noi_dung,
                    tinh_trang_tha: "Co dieu kien",
                    createdBy: data.createdBy,
                    unit: data.unit,
                    timestamp: Date.now()
                };
                db.ref('thi_hanh_an').push(thaData);
                alert("Đã chuyển dữ liệu sang phần Thi hành án dân sự!");
            }
        }

        function resetForm() {
            document.getElementById('ngay_nhan').value = '';
            document.getElementById('ho_ten').value = '';
            document.getElementById('dia_chi').value = '';
            document.getElementById('noi_dung').value = '';
            document.getElementById('de_xuat_tu_dien').value = '';
            document.getElementById('pdf_file').value = '';
            editingKey = null;
        }

        function loadData() {
            if (!checkLogin()) return;

            db.ref('don_khieu_to').on('value', (snapshot) => {
                const datas = snapshot.val() || {};
                let html = '';
                let stt = 1;

                Object.keys(datas).forEach(key => {
                    const item = datas[key];

                    // Filter theo đơn vị và người tạo
                    const canView = currentUser.level === 'toi_cao' || 
                                   (item.unit && item.unit === currentUser.unit) ||
                                   (item.createdBy && item.createdBy === currentUser.username);

                    if (!canView) return;

                    const tomTat = item.noi_dung ? item.noi_dung.substring(0, 60) + '...' : '';
                    const pdfLink = item.pdf_url ? `<a href="${item.pdf_url}" target="_blank" class="btn-pdf">PDF</a>` : 'Không có';

                    html += `<tr>
                        <td>${stt++}</td>
                        <td>${item.ngay_nhan || ''}</td>
                        <td>${item.nguon_don || ''}</td>
                        <td>${item.ho_ten || ''}</td>
                        <td>${item.phan_loai || ''}</td>
                        <td>${tomTat}</td>
                        <td>${pdfLink}</td>
                        <td>
                            <button class="btn-edit" onclick="editRecord('${key}')">Sửa</button>
                            <button class="btn-delete" onclick="deleteRecord('${key}')">Xóa</button>
                        </td>
                    </tr>`;
                });

                document.getElementById('table-body').innerHTML = html || '<tr><td colspan="8" style="text-align:center;color:#999">Chưa có đơn nào thuộc thẩm quyền của bạn</td></tr>';
            });
        }

        // Các hàm edit và delete (cơ bản)
        function editRecord(key) {
            alert("Chức năng sửa đang được hoàn thiện. Bạn có thể xóa và tạo mới tạm thời.");
        }

        function deleteRecord(key) {
            if (confirm("Xóa đơn này?")) {
                db.ref('don_khieu_to/' + key).remove();
            }
        }

        window.onload = () => {
            checkLogin();
            loadData();
        };
    </script>
</body>
</html>
