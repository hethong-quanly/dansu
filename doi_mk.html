<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; margin: 0; padding: 40px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #0408c5; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; padding: 14px; background: #5670e6; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 15px; }
        .back { text-align: center; margin-top: 20px; }
        .error { color: red; text-align: center; }
        .success { color: green; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔑 Đổi mật khẩu</h2>
        <div id="message" class="error"></div>

        <input type="password" id="old_pass" placeholder="Mật khẩu cũ">
        <input type="password" id="new_pass" placeholder="Mật khẩu mới">
        <input type="password" id="confirm_pass" placeholder="Nhập lại mật khẩu mới">

        <button onclick="changePassword()">ĐỔI MẬT KHẨU</button>

        <div class="back">
            <a href="index.html">← Quay về Menu chính</a>
        </div>
    </div>

    <script>
        var firebaseConfig = { /* Giữ nguyên firebaseConfig của bạn */ 
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        const currentUser = JSON.parse(localStorage.getItem('vks_user') || '{}');
        if (!currentUser.username) {
            alert("Vui lòng đăng nhập trước!");
            window.location.href = "index.html";
        }

        function changePassword() {
            const oldPass = document.getElementById('old_pass').value;
            const newPass = document.getElementById('new_pass').value;
            const confirmPass = document.getElementById('confirm_pass').value;
            const msg = document.getElementById('message');

            if (newPass !== confirmPass) {
                msg.textContent = "Mật khẩu mới không khớp!";
                return;
            }
            if (newPass.length < 6) {
                msg.textContent = "Mật khẩu mới phải ít nhất 6 ký tự!";
                return;
            }

            db.ref('users/' + currentUser.username).once('value').then(snapshot => {
                const userData = snapshot.val();
                if (userData && userData.password === oldPass) {
                    db.ref('users/' + currentUser.username).update({ password: newPass }).then(() => {
                        msg.className = "success";
                        msg.textContent = "✅ Đổi mật khẩu thành công!";
                        setTimeout(() => window.location.href = "index.html", 1500);
                    });
                } else {
                    msg.textContent = "Mật khẩu cũ không đúng!";
                }
            });
        }
    </script>
</body>
</html>
