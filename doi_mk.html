<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 380px; text-align: center; }
        h2 { color: #1e88e5; margin-bottom: 10px; }
        .account { color: #555; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-confirm { background: #26a69a; color: white; }
        .btn-cancel { background: #78909c; color: white; }
        .message { padding: 10px; margin: 10px 0; border-radius: 6px; font-size: 14px; }
        .success { background: #c8e6c9; color: #2e7d32; }
        .error { background: #ffcdd2; color: #c62828; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔑 Đổi mật khẩu</h2>
        <div class="account">Tài khoản: <strong id="current-user">admin</strong></div>
        
        <input type="password" id="old_pass" placeholder="Mật khẩu cũ">
        <input type="password" id="new_pass" placeholder="Mật khẩu mới (ít nhất 6 ký tự)">
        <input type="password" id="confirm_pass" placeholder="Nhập lại mật khẩu mới">
        
        <button class="btn-confirm" onclick="changePass()">XÁC NHẬN ĐỔI MẬT KHẨU</button>
        <button class="btn-cancel" onclick="window.location.href='index.html'">HỦY & QUAY LẠI</button>
        
        <div id="message" class="message" style="display:none;"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.firebaseio.com",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = localStorage.getItem('vks_username') || 'admin';

        document.getElementById('current-user').textContent = currentUser;

        function showMessage(text, isSuccess) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${isSuccess ? 'success' : 'error'}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }

        window.changePass = function() {
            const oldP = document.getElementById('old_pass').value.trim();
            const newP = document.getElementById('new_pass').value.trim();
            const confirmP = document.getElementById('confirm_pass').value.trim();

            if (!oldP || !newP || !confirmP) {
                showMessage("Vui lòng nhập đầy đủ thông tin!", false);
                return;
            }
            if (newP.length < 6) {
                showMessage("Mật khẩu mới phải ít nhất 6 ký tự!", false);
                return;
            }
            if (newP !== confirmP) {
                showMessage("Mật khẩu mới và xác nhận không khớp!", false);
                return;
            }

            // Xử lý đặc biệt cho admin
            if (currentUser === "admin") {
                if (oldP === "123" || oldP === "123456") {
                    db.ref('users/admin').update({ password: newP })
                        .then(() => {
                            showMessage("✅ Đổi mật khẩu admin thành công! Vui lòng đăng nhập lại với mật khẩu mới.", true);
                            setTimeout(() => {
                                localStorage.clear();
                                window.location.href = 'index.html';
                            }, 2000);
                        })
                        .catch(err => showMessage("Lỗi Firebase: " + err.message, false));
                    return;
                } else {
                    showMessage("Mật khẩu cũ không đúng (admin mặc định là 123 hoặc 123456)", false);
                    return;
                }
            }

            // Người dùng thường
            db.ref('users/' + currentUser).once('value')
                .then(snapshot => {
                    const userData = snapshot.val();
                    if (userData && userData.password === oldP) {
                        db.ref('users/' + currentUser).update({ password: newP })
                            .then(() => {
                                showMessage("✅ Đổi mật khẩu thành công!", true);
                                setTimeout(() => window.location.href = 'index.html', 1500);
                            });
                    } else {
                        showMessage("Mật khẩu cũ không đúng!", false);
                    }
                })
                .catch(err => showMessage("Lỗi: " + err.message, false));
        };

        // Hỗ trợ nhấn Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === "Enter") changePass();
        });
    </script>
</body>
</html>
