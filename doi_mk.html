<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu - VKSND</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 6px 25px rgba(0,0,0,0.15); width: 420px; text-align: center; }
        h2 { color: #0408c5; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        button { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .btn-change { background: #16a085; color: white; }
        .btn-cancel { background: #95a5a6; color: white; }
        .message { margin: 15px 0; padding: 12px; border-radius: 6px; font-size: 14px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔑 Đổi mật khẩu</h2>
        <p id="display_user" style="font-weight:bold; color:#5670e6; margin:15px 0;">Đang tải...</p>

        <input type="password" id="old_p" placeholder="Mật khẩu hiện tại">
        <input type="password" id="new_p" placeholder="Mật khẩu mới (ít nhất 6 ký tự)">
        <input type="password" id="new_p_confirm" placeholder="Nhập lại mật khẩu mới">

        <button class="btn-change" onclick="changePass()">XÁC NHẬN ĐỔI MẬT KHẨU</button>
        <button class="btn-cancel" onclick="window.location.href='index.html'">HỦY & QUAY LẠI</button>

        <div id="message" class="message" style="display:none;"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = localStorage.getItem('vks_username') || "admin";

        window.onload = () => {
            document.getElementById('display_user').innerText = "Tài khoản: " + currentUser;
        };

        function showMessage(text, isSuccess) {
            const msg = document.getElementById('message');
            msg.innerHTML = text;
            msg.className = `message ${isSuccess ? 'success' : 'error'}`;
            msg.style.display = 'block';
        }

        function changePass() {
            const oldP = document.getElementById('old_p').value.trim();
            const newP = document.getElementById('new_p').value.trim();
            const confirmP = document.getElementById('new_p_confirm').value.trim();

            if (!oldP || !newP || !confirmP) return showMessage("Vui lòng nhập đầy đủ!", false);
            if (newP.length < 6) return showMessage("Mật khẩu mới phải ≥ 6 ký tự!", false);
            if (newP !== confirmP) return showMessage("Mật khẩu mới không khớp!", false);

            if (currentUser === "admin") {
                if (oldP === "123" || oldP === "123456") {
                    db.ref('users/admin/password').set(newP).then(() => {
                        showMessage("✅ Đổi mật khẩu admin thành công!<br>Đang chuyển về trang đăng nhập...", true);
                        setTimeout(() => { localStorage.clear(); window.location.href = 'index.html'; }, 1800);
                    });
                    return;
                } else {
                    return showMessage("Mật khẩu cũ của admin không đúng (mặc định: 123 hoặc 123456)", false);
                }
            }

            db.ref('users/' + currentUser).once('value').then(snapshot => {
                const user = snapshot.val();
                if (user && user.password === oldP) {
                    db.ref('users/' + currentUser + '/password').set(newP).then(() => {
                        showMessage("✅ Đổi mật khẩu thành công!", true);
                        setTimeout(() => window.location.href = 'index.html', 1500);
                    });
                } else {
                    showMessage("Mật khẩu cũ không đúng!", false);
                }
            });
        }

        document.addEventListener('keypress', e => { if (e.key === "Enter") changePass(); });
    </script>
</body>
</html>
