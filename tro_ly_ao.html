<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trợ lý ảo - Rút kinh nghiệm</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #0408c5; color: #f8f536; text-align: center; padding: 20px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 25px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; }
        
        .chat-container { max-width: 1000px; margin: 30px auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .chat-header { background: #0408c5; color: white; padding: 15px; font-size: 18px; font-weight: bold; }
        .chat-body { height: 520px; overflow-y: auto; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 14px 18px; border-radius: 18px; max-width: 85%; line-height: 1.5; }
        .assistant { background: #e0f2f1; align-self: flex-start; }
        .user { background: #5670e6; color: white; align-self: flex-end; }
        
        button { 
            background: #5670e6; color: white; padding: 12px 24px; 
            border: none; border-radius: 8px; cursor: pointer; font-size: 15px; margin: 8px 5px;
        }
        button:hover { background: #0408c5; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h2>🤖 TRỢ LÝ ẢO - TỔNG HỢP VI PHẠM & RÚT KINH NGHIỆM</h2>
    </header>

    <div class="chat-container">
        <div class="chat-header">Trợ lý đang phân tích dữ liệu từ toàn bộ hệ thống...</div>
        <div class="chat-body" id="chat-body">
            <div class="message assistant">
                Xin chào!<br><br>
                Tôi là Trợ lý ảo của VKSND. Tôi có thể giúp bạn:<br>
                • Tổng hợp vi phạm theo ngày/tháng<br>
                • Rút kinh nghiệm từ dữ liệu hệ thống<br>
                • Gợi ý cách xử lý vụ việc tương tự
            </div>
        </div>

        <div style="padding:20px; text-align:center; background:#fff; border-top:1px solid #eee;">
            <button onclick="phanTichHomNay()">📅 Tổng hợp vi phạm HÔM NAY</button>
            <button onclick="phanTichThangNay()">📆 Tổng hợp vi phạm THÁNG NÀY</button>
            <button onclick="rutKinhNghiemToanBo()">📊 Rút kinh nghiệm TOÀN BỘ</button>
        </div>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        function addMessage(text, isAssistant = true) {
            const chat = document.getElementById('chat-body');
            const div = document.createElement('div');
            div.className = `message ${isAssistant ? 'assistant' : 'user'}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function phanTichHomNay() {
            addMessage("Đang quét dữ liệu hôm nay...", true);
            setTimeout(() => {
                addMessage(`<strong>Kết quả phân tích hôm nay:</strong><br>
                • 2 vụ án dân sự chậm thụ lý quá thời hạn.<br>
                • 1 đơn khiếu nại thuộc thẩm quyền nhưng chưa ra quyết định thụ lý.<br>
                • 1 vụ thi hành án có tài sản chưa bán được sau giảm giá.<br><br>
                <strong>Thông báo rút kinh nghiệm:</strong><br>
                - Cần kiểm tra hồ sơ ngay khi thụ lý để tránh chậm trễ.<br>
                - Tăng cường phối hợp giữa các phòng nghiệp vụ.`, true);
            }, 1500);
        }

        function phanTichThangNay() {
            addMessage("Đang tổng hợp dữ liệu tháng này...", true);
            setTimeout(() => {
                addMessage(`<strong>Tóm tắt tháng này:</strong><br>
                • Tỷ lệ đơn khiếu nại đúng thẩm quyền: 65% (cần cải thiện).<br>
                • Số vụ chuyển thi hành án: 8 vụ.<br>
                • Vi phạm phổ biến: Chậm xác minh điều kiện thi hành án.<br><br>
                <strong>Rút kinh nghiệm:</strong><br>
                - Đề xuất tập huấn về thời hạn giải quyết khiếu nại tố cáo.`, true);
            }, 1600);
        }

        function rutKinhNghiemToanBo() {
            addMessage("Đang phân tích toàn bộ dữ liệu hệ thống...", true);
            setTimeout(() => {
                addMessage(`<strong>Rút kinh nghiệm tổng quát:</strong><br>
                1. Chú trọng thời hạn thụ lý và chuẩn bị xét xử theo BLTTDS 2015.<br>
                2. Tăng cường xác minh điều kiện thi hành án ngay từ đầu.<br>
                3. Giảm tỷ lệ đơn khiếu nại bằng cách nâng cao chất lượng hồ sơ ban đầu.<br>
                4. Thường xuyên rà soát tài sản kê biên để đẩy nhanh tiến độ đấu giá.`, true);
            }, 1800);
        }
    </script>
</body>
</html>
