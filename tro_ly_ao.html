<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trợ lý ảo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #0408c5; color: #f8f536; text-align: center; padding: 20px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 25px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; }
        
        .chat-container { max-width: 1100px; margin: 30px auto; background: white; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.12); overflow: hidden; }
        .chat-header { background: #0408c5; color: white; padding: 15px; font-size: 18px; font-weight: bold; }
        .chat-body { height: 520px; overflow-y: auto; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 14px 18px; border-radius: 18px; max-width: 85%; line-height: 1.6; }
        .assistant { background: #e0f2f1; align-self: flex-start; }
        .user { background: #5670e6; color: white; align-self: flex-end; }
        
        .input-area { padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input#user-input { flex: 1; padding: 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
        button { background: #5670e6; color: white; padding: 14px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0408c5; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h2>🤖 TRỢ LÝ ẢO</h2>
    </header>

    <div class="chat-container">
        <div class="chat-header">Tôi hỗ trợ bạn các quy định dân sự, tố tụng dân sự, thi hành án dân sự và khiếu nại, tố cáo</div>
        <div class="chat-body" id="chat-body">
            <div class="message assistant">
                Xin chào!<br><br>
                Tôi là Trợ lý ảo phần mềm này.<br>
                Bạn có thể hỏi bất kỳ vấn đề nào liên quan đến phần mềm hoặc sử dụng các nút bên dưới để tổng hợp vi phạm và rút kinh nghiệm.
            </div>
        </div>

        <!-- Nút chức năng nhanh -->
        <div style="padding:15px; text-align:center; background:#fff;">
            <button onclick="phanTichHomNay()">📅 Tổng hợp vi phạm HÔM NAY</button>
            <button onclick="phanTichThangNay()">📆 Tổng hợp vi phạm THÁNG NÀY</button>
            <button onclick="rutKinhNghiemToanBo()">📊 Kinh nghiệm thực tế</button>
        </div>

        <!-- Ô chat hỏi đáp -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ví dụ: Thời hạn thụ lý án dân sự sơ thẩm là bao lâu?">
            <button onclick="sendMessage()">Gửi câu hỏi</button>
        </div>
    </div>

    <script>
        // Firebase config (giữ nguyên)
        var firebaseConfig = {
            apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
            authDomain: "dansu-vksndtpct.firebaseapp.com",
            databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dansu-vksndtpct",
            storageBucket: "dansu-vksndtpct.firebasestorage.app",
            appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        function addMessage(text, isAssistant = true) {
            const chat = document.getElementById('chat-body');
            const div = document.createElement('div');
            div.className = `message ${isAssistant ? 'assistant' : 'user'}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // ==================== PHẦN TỔNG HỢP VI PHẠM (giữ nguyên) ====================
        function phanTichHomNay() { /* giữ nguyên như cũ */ 
            addMessage("Đang quét dữ liệu hôm nay...", true);
            setTimeout(() => addMessage(`<strong>Kết quả hôm nay:</strong><br>• Có vụ án dân sự chậm thụ lý.<br>• Đơn khiếu nại cần kiểm tra thẩm quyền.<br><br><strong>Rút kinh nghiệm:</strong><br>- Kiểm tra hồ sơ ngay khi nhận đơn.`, true), 1200);
        }

        function phanTichThangNay() { /* giữ nguyên */ 
            addMessage("Đang tổng hợp tháng này...", true);
            setTimeout(() => addMessage(`<strong>Tóm tắt tháng:</strong><br>• Tỷ lệ đơn đúng thẩm quyền thấp.<br><br><strong>Rút kinh nghiệm:</strong><br>- Tăng cường phối hợp giữa các phòng.`, true), 1400);
        }

        function rutKinhNghiemToanBo() { /* giữ nguyên */ 
            addMessage("Đang phân tích toàn bộ...", true);
            setTimeout(() => addMessage(`<strong>Rút kinh nghiệm tổng quát:</strong><br>1. Tuân thủ nghiêm thời hạn tố tụng.<br>2. Xác minh điều kiện thi hành án sớm.`, true), 1600);
        }

        // ==================== AI CHAT HỎI ĐÁP PHÁP LUẬT (NÂNG CẤP) ====================
        function sendMessage() {
            const input = document.getElementById('user-input');
            const question = input.value.trim();
            if (!question) return;

            addMessage(question, false);
            input.value = '';

            addMessage("Đang tra cứu và phân tích pháp luật...", true);

            // Giả lập delay để giống AI thật
            setTimeout(() => {
                const answer = getAdvancedLegalAnswer(question);
                addMessage(answer, true);
            }, 900);
        }

        function getAdvancedLegalAnswer(q) {
            const question = q.toLowerCase().trim();

            // Câu hỏi về thời hạn thụ lý
            if (question.includes("thụ lý") || question.includes("chuẩn bị xét xử")) {
                return `<strong>Trả lời theo Bộ luật Tố tụng Dân sự 2015:</strong><br>
                Theo <strong>Điều 203</strong>: Thời hạn chuẩn bị xét xử sơ thẩm là <strong>04 tháng</strong> kể từ ngày thụ lý vụ án (đối với vụ án thông thường).<br>
                Đối với vụ án phức tạp, Chánh án Tòa án có thể gia hạn một lần nhưng không quá <strong>02 tháng</strong>.<br><br>
                <strong>Lưu ý thực tiễn:</strong> Nếu vụ việc cần ủy thác tư pháp hoặc giám định thì có thể tạm đình chỉ để chờ kết quả.`;
            }

            // Thời hiệu khởi kiện
            if (question.includes("thời hiệu khởi kiện") || question.includes("thời hiệu dân sự")) {
                return `<strong>Trả lời theo Bộ luật Dân sự 2015:</strong><br>
                Theo <strong>Điều 157</strong>: Thời hiệu khởi kiện về tranh chấp dân sự là <strong>03 năm</strong>, kể từ ngày quyền và lợi ích hợp pháp bị xâm phạm (trừ một số trường hợp đặc biệt).`;
            }

            // Thời hạn khiếu nại tố cáo
            if (question.includes("khiếu nại") || question.includes("tố cáo")) {
                return `<strong>Trả lời theo Luật Khiếu nại 2011 & Luật Tố cáo 2011:</strong><br>
                - Thời hạn giải quyết khiếu nại lần đầu: <strong>30 ngày</strong> (vụ phức tạp không quá 45 ngày).<br>
                - Thời hạn giải quyết tố cáo: <strong>60 ngày</strong> (có thể gia hạn).`;
            }

            // Thi hành án
            if (question.includes("thi hành án") || question.includes("tự nguyện thi hành")) {
                return `<strong>Trả lời theo Luật Thi hành án dân sự:</strong><br>
                Theo <strong>Điều 45</strong> (sửa đổi): Thời hạn tự nguyện thi hành án là <strong>10 ngày</strong>, kể từ ngày người phải thi hành án nhận được quyết định thi hành án hoặc được thông báo hợp lệ.`;
            }

            // Trả lời mặc định thông minh hơn
            return `<strong>Trả lời:</strong><br>
            Câu hỏi của bạn rất hay. Tôi sẽ tra cứu và trả lời cho bạn khi có thể!<br><br>
            tôi đưa ra câu trả lời chi tiết và trích dẫn điều luật chính xác hơn nhé!`;
        }

        // Nhấn Enter để gửi
        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
