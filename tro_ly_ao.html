<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trợ lý ảo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #0408c5; color: #f8f536; text-align: center; padding: 20px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 25px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; }
        
        .chat-container { max-width: 1100px; margin: 30px auto; background: white; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.12); overflow: hidden; }
        .chat-header { background: #0408c5; color: white; padding: 15px; font-size: 18px; font-weight: bold; }
        .chat-body { height: 520px; overflow-y: auto; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 14px 18px; border-radius: 18px; max-width: 90%; line-height: 1.6; }
        .assistant { background: #e0f2f1; align-self: flex-start; }
        .user { background: #5670e6; color: white; align-self: flex-end; }
        
        .input-area { padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input#user-input { flex: 1; padding: 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
        button { background: #5670e6; color: white; padding: 14px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0408c5; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h2>🤖 TRỢ LÝ ẢO</h2>
    </header>

    <div class="chat-container">
        <div class="chat-header">Tôi hỗ trợ bạn về pháp luật và cách sử dụng phần mềm</div>
        <div class="chat-body" id="chat-body">
            <div class="message assistant">
                Xin chào!<br><br>
                Chào bạn! Tôi có thể giúp gì cho bạn?
            </div>
        </div>

        <div style="padding:15px; text-align:center; background:#fff;">
            <button onclick="phanTichHomNay()">📅 Tổng hợp vi phạm hôm nay</button>
            <button onclick="phanTichThangNay()">📆 Tổng hợp vi phạm tháng này</button>
            <button onclick="rutKinhNghiemToanBo()">📊 Rút kinh nghiệm tổng quát</button>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Hỏi tôi bất kỳ điều gì...">
            <button onclick="sendMessage()">Gửi</button>
        </div>
    </div>

    <script>
        function addMessage(text, isAssistant = true) {
            const chat = document.getElementById('chat-body');
            const div = document.createElement('div');
            div.className = `message ${isAssistant ? 'assistant' : 'user'}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const q = input.value.trim();
            if (!q) return;

            addMessage(q, false);
            input.value = "";

            addMessage("Đang tra cứu và phân tích...", true);

            // Giả lập tìm kiếm trên mạng + phân tích
            setTimeout(() => {
                const answer = getAdvancedAnswer(q);
                addMessage(answer, true);
            }, 800);
        }

        function getAdvancedAnswer(q) {
            const question = q.toLowerCase();

            // Hỗ trợ sử dụng phần mềm
            if (question.includes("đổi mật khẩu") || question.includes("thay đổi mật khẩu")) {
                return `✅ <strong>Hướng dẫn đổi mật khẩu:</strong><br><br>
                1. Sau khi đăng nhập, click vào mục <strong>"Đổi mật khẩu"</strong>.<br>
                2. Nhập mật khẩu hiện tại.<br>
                3. Nhập mật khẩu mới và xác nhận lại.<br>
                4. Nhấn <strong>"XÁC NHẬN ĐỔI MẬT KHẨU"</strong>.<br><br>
                Mật khẩu mới nên có ít nhất 6 ký tự.`;
            }

            if (question.includes("nhập dữ liệu") || question.includes("thêm hồ sơ")) {
                return `✅ <strong>Hướng dẫn nhập dữ liệu:</strong><br><br>
                1. Chọn module (Án dân sự / Khiếu nại / Thi hành án).<br>
                2. Điền thông tin vào form bên trái.<br>
                3. Chọn file PDF nếu có.<br>
                4. Nhấn <strong>"LƯU HỒ SƠ"</strong>.`;
            }

            if (question.includes("sửa") || question.includes("chỉnh sửa")) {
                return `✅ <strong>Hướng dẫn chỉnh sửa:</strong><br><br>
                1. Tìm hồ sơ trong bảng.<br>
                2. Nhấn nút <strong>"Sửa"</strong> (màu cam).<br>
                3. Sửa thông tin → Nhấn <strong>"CẬP NHẬT"</strong>.`;
            }

            // Hỏi đáp pháp luật
            if (question.includes("thụ lý") || question.includes("thời hạn thụ lý")) {
                return `✅ Theo <strong>Bộ luật Tố tụng Dân sự 2015, Điều 203</strong>:<br>
                Thời hạn chuẩn bị xét xử sơ thẩm là <strong>04 tháng</strong> kể từ ngày thụ lý vụ án.`;
            }

            // Trả lời mặc định thông minh
            return `✅ Câu hỏi của bạn rất hay!<br><br>
            Tôi đã tra cứu theo pháp luật hiện hành của Việt Nam.<br>
            Bạn có thể hỏi cụ thể hơn (ví dụ: "Cách nhập dữ liệu án dân sự?" hoặc "Thời hạn kháng cáo bản án dân sự là bao lâu?") để tôi hỗ trợ chi tiết nhất.`;
        }

        // Nhấn Enter để gửi
        document.getElementById('user-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
