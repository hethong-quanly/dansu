<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trợ lý ảo VKSND - Hỗ trợ toàn diện</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f7fa; }
        header { background: #0408c5; color: #f8f536; text-align: center; padding: 20px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 25px; color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 6px; }
        
        .chat-container { max-width: 1100px; margin: 30px auto; background: white; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.12); overflow: hidden; }
        .chat-header { background: #0408c5; color: white; padding: 15px; font-size: 18px; font-weight: bold; }
        .chat-body { height: 520px; overflow-y: auto; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 14px 18px; border-radius: 18px; max-width: 90%; line-height: 1.6; }
        .assistant { background: #e0f2f1; align-self: flex-start; }
        .user { background: #5670e6; color: white; align-self: flex-end; }
        
        .input-area { padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input#user-input { flex: 1; padding: 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
        button { background: #5670e6; color: white; padding: 14px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0408c5; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Menu chính</a>
        <h2>🤖 TRỢ LÝ ẢO</h2>
    </header>

    <div class="chat-container">
        <div class="chat-header">Tôi có thể hướng dẫn bạn sử dụng phần mềm và trả lời về pháp luật</div>
        <div class="chat-body" id="chat-body">
            <div class="message assistant">
                Xin chào!<br><br>
                Tôi là Trợ lý ảo của VKSND.<br>
                Bạn cần gì? Tôi sẽ hỗ trợ bạn<br>
                Bạn cứ hỏi thoải mái nhé!
            </div>
        </div>

        <div style="padding:15px; text-align:center; background:#fff;">
            <button onclick="phanTichHomNay()">📅 Tổng hợp vi phạm trong ngày</button>
            <button onclick="phanTichThangNay()">📆 Tổng hợp vi phạm trong thángY</button>
            <button onclick="rutKinhNghiemToanBo()">📊 Thông báo rút kinh nghiệm</button>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Hỏi bất kỳ điều gì...">
            <button onclick="sendMessage()">Gửi</button>
        </div>
    </div>

    <script>
        function addMessage(text, isAssistant = true) {
            const chat = document.getElementById('chat-body');
            const div = document.createElement('div');
            div.className = `message ${isAssistant ? 'assistant' : 'user'}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Phần tổng hợp vi phạm (giữ nguyên)
        function phanTichHomNay() {
            addMessage("Đang phân tích dữ liệu hôm nay...", true);
            setTimeout(() => addMessage(`<strong>Kết quả hôm nay:</strong><br>• Có vụ án dân sự chậm thụ lý.<br>• 1 đơn khiếu nại cần kiểm tra lại thẩm quyền.<br><br><strong>Rút kinh nghiệm:</strong><br>- Nên kiểm tra hồ sơ ngay khi nhận đơn để tránh chậm trễ.`, true), 1000);
        }

        function phanTichThangNay() {
            addMessage("Đang tổng hợp tháng này...", true);
            setTimeout(() => addMessage(`<strong>Tóm tắt tháng này:</strong><br>• Tỷ lệ đơn đúng thẩm quyền cần cải thiện.<br><br><strong>Rút kinh nghiệm:</strong><br>- Tăng cường phối hợp giữa các phòng nghiệp vụ.`, true), 1000);
        }

        function rutKinhNghiemToanBo() {
            addMessage("Đang phân tích toàn bộ dữ liệu...", true);
            setTimeout(() => addMessage(`<strong>Rút kinh nghiệm tổng quát:</strong><br>1. Luôn kiểm tra thời hạn tố tụng theo Bộ luật Tố tụng Dân sự.<br>2. Xác minh điều kiện thi hành án ngay từ đầu.<br>3. Nâng cao chất lượng hồ sơ để giảm khiếu nại.`, true), 1000);
        }

        // Trợ lý thông minh - Phiên bản cải tiến
        function sendMessage() {
            const input = document.getElementById('user-input');
            const q = input.value.trim();
            if (!q) return;

            addMessage(q, false);
            input.value = "";

            addMessage("Đang suy nghĩ và tra cứu...", true);

            setTimeout(() => {
                const answer = getSmartResponse(q);
                addMessage(answer, true);
            }, 700);
        }

        function getSmartResponse(q) {
            const question = q.toLowerCase();

            // Hỗ trợ sử dụng phần mềm
            if (question.includes("đổi mật khẩu") || question.includes("thay đổi mật khẩu")) {
                return `✅ <strong>Hướng dẫn đổi mật khẩu chi tiết:</strong><br><br>
                1. Sau khi đăng nhập vào hệ thống, click vào mục <strong>"Đổi mật khẩu"</strong> ở menu chính.<br>
                2. Nhập <strong>mật khẩu hiện tại</strong>.<br>
                3. Nhập <strong>mật khẩu mới</strong> và nhập lại một lần nữa.<br>
                4. Nhấn nút <strong>"XÁC NHẬN ĐỔI"</strong>.<br><br>
                <strong>Lưu ý:</strong> Mật khẩu mới nên có ít nhất 6 ký tự để dễ nhớ và an toàn.`;
            }

            if (question.includes("nhập dữ liệu") || question.includes("thêm hồ sơ")) {
                return `✅ <strong>Hướng dẫn nhập dữ liệu:</strong><br><br>
                1. Chọn mục bạn muốn nhập (Án dân sự, Khiếu nại Tố cáo, hoặc Thi hành án).<br>
                2. Điền đầy đủ thông tin vào form bên trái.<br>
                3. Nếu có file PDF, nhấn chọn file.<br>
                4. Cuối cùng nhấn nút <strong>"LƯU HỒ SƠ"</strong>.<br><br>
                Dữ liệu sẽ tự động hiện lên bảng bên phải.`;
            }

            if (question.includes("sửa") || question.includes("chỉnh sửa")) {
                return `✅ <strong>Hướng dẫn chỉnh sửa dữ liệu:</strong><br><br>
                1. Tìm hồ sơ cần sửa trong bảng danh sách.<br>
                2. Nhấn nút <strong>"Sửa"</strong> (màu cam).<br>
                3. Sửa thông tin trong form.<br>
                4. Nhấn nút <strong>"CẬP NHẬT"</strong>.`;
            }

            if (question.includes("xóa") || question.includes("xoá")) {
                return `✅ <strong>Hướng dẫn xóa dữ liệu:</strong><br><br>
                1. Tìm hồ sơ cần xóa trong bảng.<br>
                2. Nhấn nút <strong>"Xóa"</strong> (màu đỏ).<br>
                3. Xác nhận lần nữa khi hiện hộp thoại.<br><br>
                <strong>Lưu ý:</strong> Dữ liệu đã xóa không thể khôi phục.`;
            }

            // Hỏi đáp pháp luật
            if (question.includes("thụ lý") || question.includes("thời hạn thụ lý")) {
                return `✅ Theo <strong>Bộ luật Tố tụng Dân sự 2015, Điều 203</strong>:<br>
                Thời hạn chuẩn bị xét xử sơ thẩm là <strong>04 tháng</strong> kể từ ngày thụ lý vụ án.<br>
                Nếu vụ việc phức tạp, có thể gia hạn một lần nhưng không quá 02 tháng.`;
            }

            if (question.includes("thời hiệu khởi kiện")) {
                return `✅ Theo <strong>Bộ luật Dân sự 2015, Điều 157</strong>:<br>
                Thời hiệu khởi kiện về tranh chấp dân sự là <strong>03 năm</strong>, kể từ ngày quyền và lợi ích bị xâm phạm.`;
            }

            // Trả lời mặc định hữu ích
            return `✅ Câu hỏi của bạn rất hay!<br><br>
            Hiện tại tôi có thể hỗ trợ bạn về:<br>
            • Cách sử dụng phần mềm (đổi mật khẩu, nhập/sửa/xóa dữ liệu...)<br>
            • Quy định pháp luật (thời hạn, thời hiệu, thẩm quyền...)<br>
            • Rút kinh nghiệm từ dữ liệu hệ thống<br><br>
            Bạn hãy hỏi cụ thể hơn một chút nhé, ví dụ:<br>
            - "Cách nhập dữ liệu án dân sự?"<br>
            - "Thời hạn thụ lý án dân sự là bao lâu?"<br>
            - "Cách tra cứu danh sách đã nhập?"`;
        }

        // Nhấn Enter để gửi
        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
